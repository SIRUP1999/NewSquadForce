const eventBus = new (class EventBus {
  constructor() {
    this.listeners = new Map();
  }

  on(event, callback, context = null, once = false) {
    if (!this.listeners.has(event)) {
      this.listeners.set(event, []);
    }
    this.listeners.get(event).push({ callback, context, once });
    return this;
  }

  once(event, callback, context = null) {
    return this.on(event, callback, context, true);
  }

  off(event, callback) {
    if (!this.listeners.has(event)) return this;
    const listeners = this.listeners.get(event);
    const index = listeners.findIndex(l => l.callback === callback);
    if (index !== -1) {
      listeners.splice(index, 1);
    }
    return this;
  }

  emit(event, ...args) {
    if (!this.listeners.has(event)) return this;
    const listeners = this.listeners.get(event);
    for (let i = listeners.length - 1; i >= 0; i--) {
      const { callback, context, once } = listeners[i];
      try {
        callback.apply(context, args);
      } catch (err) {
        console.error(`EventBus error in ${event}:`, err);
      }
      if (once) {
        listeners.splice(i, 1);
      }
    }
    return this;
  }

  clear(event) {
    if (event) {
      this.listeners.delete(event);
    } else {
      this.listeners.clear();
    }
    return this;
  }

  listenerCount(event) {
    return this.listeners.has(event) ? this.listeners.get(event).length : 0;
  }
})();

const Utils = {
  clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  },

  lerp(a, b, t) {
    return a + (b - a) * t;
  },

  lerpAngle(a, b, t) {
    const diff = ((b - a + Math.PI) % (Math.PI * 2)) - Math.PI;
    return a + diff * t;
  },

  distance(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    return Math.sqrt(dx * dx + dy * dy);
  },

  distanceSquared(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    return dx * dx + dy * dy;
  },

  angle(x1, y1, x2, y2) {
    return Math.atan2(y2 - y1, x2 - x1);
  },

  normalizeAngle(angle) {
    return ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  },

  randomRange(min, max) {
    return Math.random() * (max - min) + min;
  },

  randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  },

  randomChoice(array) {
    return array[Math.floor(Math.random() * array.length)];
  },

  randomPointInCircle(radius) {
    const r = radius * Math.sqrt(Math.random());
    const theta = Math.random() * 2 * Math.PI;
    return { x: r * Math.cos(theta), y: r * Math.sin(theta) };
  },

  vec2: {
    add(a, b) { return { x: a.x + b.x, y: a.y + b.y }; },
    sub(a, b) { return { x: a.x - b.x, y: a.y - b.y }; },
    mul(v, scalar) { return { x: v.x * scalar, y: v.y * scalar }; },
    div(v, scalar) { return { x: v.x / scalar, y: v.y / scalar }; },
    length(v) { return Math.sqrt(v.x * v.x + v.y * v.y); },
    lengthSquared(v) { return v.x * v.x + v.y * v.y; },
    normalize(v) {
      const len = Math.sqrt(v.x * v.x + v.y * v.y);
      if (len === 0) return { x: 0, y: 0 };
      return { x: v.x / len, y: v.y / len };
    },
    dot(a, b) { return a.x * b.x + a.y * b.y; },
    distance(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); },
    angle(v) { return Math.atan2(v.y, v.x); },
    fromAngle(angle) { return { x: Math.cos(angle), y: Math.sin(angle) }; },
    rotate(v, angle) {
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return { x: v.x * cos - v.y * sin, y: v.x * sin + v.y * cos };
    },
    lerp(a, b, t) {
      return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
    }
  },

  hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
      r: parseInt(result[1], 16),
      g: parseInt(result[2], 16),
      b: parseInt(result[3], 16)
    } : null;
  },

  rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(x => {
      const hex = Math.round(x).toString(16);
      return hex.length === 1 ? '0' + hex : hex;
    }).join('');
  },

  lerpColor(color1, color2, t) {
    const c1 = typeof color1 === 'string' ? this.hexToRgb(color1) : color1;
    const c2 = typeof color2 === 'string' ? this.hexToRgb(color2) : color2;
    return this.rgbToHex(
      this.lerp(c1.r, c2.r, t),
      this.lerp(c1.g, c2.g, t),
      this.lerp(c1.b, c2.b, t)
    );
  },

  circleCircle(x1, y1, r1, x2, y2, r2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const distSq = dx * dx + dy * dy;
    const radiusSum = r1 + r2;
    return distSq <= radiusSum * radiusSum;
  },

  circlePoint(cx, cy, cr, px, py) {
    const dx = px - cx;
    const dy = py - cy;
    return dx * dx + dy * dy <= cr * cr;
  },

  rectRect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
  },

  pointInRect(px, py, rx, ry, rw, rh) {
    return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
  },

  formatTime(ms) {
    const seconds = Math.floor(ms / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    if (hours > 0) {
      return `${hours}:${String(minutes % 60).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
    }
    return `${minutes}:${String(seconds % 60).padStart(2, '0')}`;
  },

  formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
  },

  deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
  },

  mergeDeep(target, source) {
    const output = Object.assign({}, target);
    if (this.isObject(target) && this.isObject(source)) {
      Object.keys(source).forEach(key => {
        if (this.isObject(source[key])) {
          if (!(key in target)) {
            Object.assign(output, { [key]: source[key] });
          } else {
            output[key] = this.mergeDeep(target[key], source[key]);
          }
        } else {
          Object.assign(output, { [key]: source[key] });
        }
      });
    }
    return output;
  },

  isObject(item) {
    return item && typeof item === 'object' && !Array.isArray(item);
  },

  capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  },

  kebabToCamel(str) {
    return str.replace(/-([a-z])/g, (match, letter) => letter.toUpperCase());
  },

  camelToKebab(str) {
    return str.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
  },

  storage: {
    set(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch (e) {
        console.error('Storage set error:', e);
        return false;
      }
    },

    get(key, defaultValue = null) {
      try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : defaultValue;
      } catch (e) {
        console.error('Storage get error:', e);
        return defaultValue;
      }
    },

    remove(key) {
      localStorage.removeItem(key);
    },

    clear() {
      localStorage.clear();
    }
  },

  resizeCanvas(canvas, width, height) {
    canvas.width = width;
    canvas.height = height;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
  },

  getCanvasCenter(canvas) {
    return { x: canvas.width / 2, y: canvas.height / 2 };
  },

  debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  },

  throttle(func, limit) {
    let inThrottle;
    return function(...args) {
      if (!inThrottle) {
        func.apply(this, args);
        inThrottle = true;
        setTimeout(() => inThrottle = false, limit);
      }
    };
  },

  createPool(createFn, resetFn, initialSize = 10) {
    const pool = [];
    for (let i = 0; i < initialSize; i++) {
      pool.push(createFn());
    }
    return {
      acquire() {
        if (pool.length > 0) return pool.pop();
        return createFn();
      },
      release(obj) {
        resetFn(obj);
        pool.push(obj);
      },
      size() {
        return pool.length;
      }
    };
  }
};

const audioManager = new (class AudioManager {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.channels = [];
    this.musicGain = null;
    this.sfxGain = null;
    this.currentMusic = null;
    this.musicSource = null;
    this.isMuted = false;
    this.masterVolume = 0.5;
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = this.masterVolume;
      this.masterGain.connect(this.ctx.destination);

      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.3;
      this.musicGain.connect(this.masterGain);

      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.4;
      this.sfxGain.connect(this.masterGain);

      // Lowpass filter to reduce harsh high frequencies
      this.lowpass = this.ctx.createBiquadFilter();
      this.lowpass.type = 'lowpass';
      this.lowpass.frequency.value = 3000;
      this.lowpass.connect(this.sfxGain);

      for (let i = 0; i < CONSTANTS.AUDIO_CHANNELS; i++) {
        const gain = this.ctx.createGain();
        gain.gain.value = 0;
        gain.connect(this.lowpass);
        this.channels.push({ gain, inUse: false, endTime: 0 });
      }

      this.initialized = true;
    } catch (e) {
      console.warn('Web Audio API not supported:', e);
    }
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  }

  getFreeChannel() {
    const now = this.ctx.currentTime;
    for (const channel of this.channels) {
      if (!channel.inUse || channel.endTime <= now) {
        channel.inUse = true;
        return channel;
      }
    }
    return null;
  }

  playSound(soundType, options = {}) {
    if (!this.initialized || this.isMuted) return;
    this.resume();

    const channel = this.getFreeChannel();
    if (!channel) return;

    const {
      frequency = 440,
      duration = 0.1,
      type = 'sine',
      volume = 0.3,
      attack = 0.02,
      decay = 0.15,
      sustain = 0.2,
      release = 0.2
    } = options;

    const osc = this.ctx.createOscillator();
    const gain = channel.gain;

    osc.type = type;
    osc.frequency.setValueAtTime(frequency, this.ctx.currentTime);

    const now = this.ctx.currentTime;
    gain.gain.cancelScheduledValues(now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(volume, now + attack);
    gain.gain.linearRampToValueAtTime(volume * sustain, now + attack + decay);
    gain.gain.linearRampToValueAtTime(0, now + attack + decay + release);

    osc.connect(gain);
    osc.start(now);
    osc.stop(now + attack + decay + release);

    channel.endTime = now + attack + decay + release;
    osc.onended = () => { channel.inUse = false; };
  }

  // FIXED: Softer, lower frequency sounds to prevent peaking
  playShoot() {
    this.playSound('shoot', {
      frequency: 400 + Math.random() * 100,
      duration: 0.08,
      type: 'triangle',

      attack: 0.005,
      decay: 0.03,
      sustain: 0,
      release: 0.08
    });
  }

  playBossAlert() {
    this.playSound('boss', {
      frequency: 150,

  }

  mute() {
    this.isMuted = true;
    if (this.masterGain) {
      this.masterGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.1);
    }
  }

  unmute() {
    this.isMuted = false;
    if (this.masterGain) {
      this.masterGain.gain.setTargetAtTime(this.masterVolume, this.ctx.currentTime, 0.1);

})();

class InputManager {
  constructor(canvas) {
    this.canvas = canvas;
    this.keys = new Map();
    this.mouse = { x: 0, y: 0, worldX: 0, worldY: 0, isDown: false, button: 0 };
    this.touch = { active: false, x: 0, y: 0, startX: 0, startY: 0, identifier: null };
    this.joystick = { active: false, x: 0, y: 0, angle: 0, magnitude: 0, centerX: 0, centerY: 0, maxRadius: 60 };
    this.isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    this.boundHandlers = {};
    this.camera = null;
  }

  init() { this.bindEvents(); }
  setCamera(camera) { this.camera = camera; }

  bindEvents() {
    this.boundHandlers.keydown = (e) => this.onKeyDown(e);
    this.boundHandlers.keyup = (e) => this.onKeyUp(e);
    window.addEventListener('keydown', this.boundHandlers.keydown);
    window.addEventListener('keyup', this.boundHandlers.keyup);

    this.boundHandlers.mousemove = (e) => this.onMouseMove(e);
    this.boundHandlers.mousedown = (e) => this.onMouseDown(e);
    this.boundHandlers.mouseup = (e) => this.onMouseUp(e);
    this.boundHandlers.contextmenu = (e) => e.preventDefault();
    this.canvas.addEventListener('mousemove', this.boundHandlers.mousemove);
    this.canvas.addEventListener('mousedown', this.boundHandlers.mousedown);
    this.canvas.addEventListener('mouseup', this.boundHandlers.mouseup);
    this.canvas.addEventListener('contextmenu', this.boundHandlers.contextmenu);

    this.boundHandlers.touchstart = (e) => this.onTouchStart(e);
    this.boundHandlers.touchmove = (e) => this.onTouchMove(e);
    this.boundHandlers.touchend = (e) => this.onTouchEnd(e);
    this.canvas.addEventListener('touchstart', this.boundHandlers.touchstart, { passive: false });
    this.canvas.addEventListener('touchmove', this.boundHandlers.touchmove, { passive: false });
    this.canvas.addEventListener('touchend', this.boundHandlers.touchend);
    this.canvas.addEventListener('touchcancel', this.boundHandlers.touchend);

    document.addEventListener('touchmove', (e) => {
      if (e.target === this.canvas) e.preventDefault();
    }, { passive: false });
  }

  destroy() {
    window.removeEventListener('keydown', this.boundHandlers.keydown);
    window.removeEventListener('keyup', this.boundHandlers.keyup);
    this.canvas.removeEventListener('mousemove', this.boundHandlers.mousemove);
    this.canvas.removeEventListener('mousedown', this.boundHandlers.mousedown);
    this.canvas.removeEventListener('mouseup', this.boundHandlers.mouseup);
    this.canvas.removeEventListener('contextmenu', this.boundHandlers.contextmenu);
    this.canvas.removeEventListener('touchstart', this.boundHandlers.touchstart);
    this.canvas.removeEventListener('touchmove', this.boundHandlers.touchmove);
    this.canvas.removeEventListener('touchend', this.boundHandlers.touchend);
    this.canvas.removeEventListener('touchcancel', this.boundHandlers.touchend);
  }

  onKeyDown(e) {
    this.keys.set(e.code, true);
    eventBus.emit(EVENTS.INPUT_KEYDOWN, e.code, e);
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'KeyW', 'KeyA', 'KeyS', 'KeyD', 'KeyR', 'Tab', 'Escape', 'Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5'].includes(e.code)) {
      e.preventDefault();
    }
  }

  onKeyUp(e) {
    this.keys.set(e.code, false);
    eventBus.emit(EVENTS.INPUT_KEYUP, e.code, e);
  }

  onMouseMove(e) {
    const rect = this.canvas.getBoundingClientRect();
    this.mouse.x = e.clientX - rect.left;
    this.mouse.y = e.clientY - rect.top;
    if (this.camera) {
      this.mouse.worldX = this.mouse.x + this.camera.x;
      this.mouse.worldY = this.mouse.y + this.camera.y;
    } else {
      this.mouse.worldX = this.mouse.x;
      this.mouse.worldY = this.mouse.y;
    }
    eventBus.emit(EVENTS.INPUT_MOUSEMOVE, this.mouse, e);
  }

  onMouseDown(e) {
    this.mouse.isDown = true;
    this.mouse.button = e.button;
    eventBus.emit(EVENTS.INPUT_MOUSEDOWN, this.mouse, e);
  }

  onMouseUp(e) {
    this.mouse.isDown = false;
    this.mouse.button = e.button;
    eventBus.emit(EVENTS.INPUT_MOUSEUP, this.mouse, e);
  }

  onTouchStart(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (!touch) return;
    const rect = this.canvas.getBoundingClientRect();
    this.touch.active = true;
    this.touch.x = touch.clientX - rect.left;
    this.touch.y = touch.clientY - rect.top;
    this.touch.startX = this.touch.x;
    this.touch.startY = this.touch.y;
    this.touch.identifier = touch.identifier;

    if (this.touch.x < this.canvas.width / 2) {
      this.joystick.active = true;
      this.joystick.centerX = this.touch.x;
      this.joystick.centerY = this.touch.y;
      this.joystick.x = this.touch.x;
      this.joystick.y = this.touch.y;
    }
    eventBus.emit(EVENTS.INPUT_TOUCHSTART, this.touch, e);
  }

  onTouchMove(e) {
    e.preventDefault();
    const touch = Array.from(e.touches).find(t => t.identifier === this.touch.identifier);
    if (!touch) return;
    const rect = this.canvas.getBoundingClientRect();
    this.touch.x = touch.clientX - rect.left;
    this.touch.y = touch.clientY - rect.top;

    if (this.joystick.active) {
      const dx = this.touch.x - this.joystick.centerX;
      const dy = this.touch.y - this.joystick.centerY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      this.joystick.angle = Math.atan2(dy, dx);
      this.joystick.magnitude = Math.min(dist / this.joystick.maxRadius, 1);

      if (dist > this.joystick.maxRadius) {
        this.joystick.x = this.joystick.centerX + Math.cos(this.joystick.angle) * this.joystick.maxRadius;
        this.joystick.y = this.joystick.centerY + Math.sin(this.joystick.angle) * this.joystick.maxRadius;
      } else {
        this.joystick.x = this.touch.x;
        this.joystick.y = this.touch.y;
      }
    }

    this.mouse.x = this.touch.x;
    this.mouse.y = this.touch.y;
    if (this.camera) {
      this.mouse.worldX = this.mouse.x + this.camera.x;
      this.mouse.worldY = this.mouse.y + this.camera.y;
    }
    eventBus.emit(EVENTS.INPUT_TOUCHMOVE, this.touch, e);
  }

  onTouchEnd(e) {
    const touch = Array.from(e.changedTouches).find(t => t.identifier === this.touch.identifier);
    if (!touch) return;
    this.touch.active = false;
    this.touch.identifier = null;
    this.joystick.active = false;
    this.joystick.magnitude = 0;
    eventBus.emit(EVENTS.INPUT_TOUCHEND, this.touch, e);
  }

  isKeyDown(code) { return this.keys.get(code) || false; }
  isAnyKeyDown(codes) { return codes.some(code => this.isKeyDown(code)); }

  getMovementVector() {
    let x = 0, y = 0;
    if (this.isKeyDown('KeyW') || this.isKeyDown('ArrowUp')) y -= 1;
    if (this.isKeyDown('KeyS') || this.isKeyDown('ArrowDown')) y += 1;
    if (this.isKeyDown('KeyA') || this.isKeyDown('ArrowLeft')) x -= 1;
    if (this.isKeyDown('KeyD') || this.isKeyDown('ArrowRight')) x += 1;

    if (this.joystick.active && this.joystick.magnitude > 0.1) {
      x = Math.cos(this.joystick.angle) * this.joystick.magnitude;
      y = Math.sin(this.joystick.angle) * this.joystick.magnitude;
    }

    const len = Math.sqrt(x * x + y * y);
    if (len > 1) { x /= len; y /= len; }
    return { x, y };
  }

  getAimAngle(fromX, fromY) {
    return Math.atan2(this.mouse.worldY - fromY, this.mouse.worldX - fromX);
  }

  getMouseWorldPos() { return { x: this.mouse.worldX, y: this.mouse.worldY }; }

  getJoystickData() {
    return {
      active: this.joystick.active,
      x: this.joystick.x,
      y: this.joystick.y,
      centerX: this.joystick.centerX,
      centerY: this.joystick.centerY,
      magnitude: this.joystick.magnitude,
      angle: this.joystick.angle
    };
  }
}

class Camera {
  constructor(canvas) {
    this.canvas = canvas;
    this.x = 0;
    this.y = 0;
    this.targetX = 0;
    this.targetY = 0;
    this.width = canvas.width;
    this.height = canvas.height;
    this.smoothness = 0.1;
    this.shakeIntensity = 0;
    this.shakeDecay = 0.85;
    this.bounds = {
      minX: 0,
      minY: 0,
      maxX: CONSTANTS.WORLD_WIDTH - this.width,
      maxY: CONSTANTS.WORLD_HEIGHT - this.height
    };
  }

  follow(targetX, targetY, dt) {
    this.targetX = targetX - this.width / 2;
    this.targetY = targetY - this.height / 2;
    this.x = Utils.lerp(this.x, this.targetX, this.smoothness);
    this.y = Utils.lerp(this.y, this.targetY, this.smoothness);

    // FIXED: Only apply shake if intensity is meaningful
    if (this.shakeIntensity > 1) {
      this.x += (Math.random() - 0.5) * this.shakeIntensity;
      this.y += (Math.random() - 0.5) * this.shakeIntensity;
      this.shakeIntensity *= this.shakeDecay;
    }

    this.x = Utils.clamp(this.x, this.bounds.minX, this.bounds.maxX);
    this.y = Utils.clamp(this.y, this.bounds.minY, this.bounds.maxY);
  }

  // FIXED: Reduced default shake intensity
  shake(intensity) {
    this.shakeIntensity = Math.min(intensity, 8); // Cap at 8 max
  }

  worldToScreen(worldX, worldY) { return { x: worldX - this.x, y: worldY - this.y }; }
  screenToWorld(screenX, screenY) { return { x: screenX + this.x, y: screenY + this.y }; }

  isVisible(worldX, worldY, radius = 0) {
    return worldX + radius >= this.x && worldX - radius <= this.x + this.width &&
           worldY + radius >= this.y && worldY - radius <= this.y + this.height;
  }

  resize(width, height) {
    this.width = width;
    this.height = height;
    this.bounds.maxX = CONSTANTS.WORLD_WIDTH - this.width;
    this.bounds.maxY = CONSTANTS.WORLD_HEIGHT - this.height;
  }
}

class Particle {
  constructor() {
    this.x = 0; this.y = 0; this.vx = 0; this.vy = 0;
    this.life = 0; this.maxLife = 0; this.size = 0;
    this.color = '#FFFFFF'; this.alpha = 1; this.decay = 0;
    this.type = 'generic'; this.active = false;
    this.rotation = 0; this.rotationSpeed = 0; this.gravity = 0;
  }
}

class ParticleSystem {
  constructor() {
    this.particles = [];
    this.maxParticles = 100; // REDUCED from 200
    this.pool = [];
    for (let i = 0; i < this.maxParticles; i++) this.pool.push(new Particle());
  }

  spawn(options) {
    const { x, y, count = 1, speed = 100, speedVar = 50, angle = 0, angleVar = Math.PI * 2,
            life = 1000, lifeVar = 200, size = 4, sizeVar = 2, color = '#FF6B35',
            colorVar = null, alpha = 1, alphaDecay = 0.02, gravity = 0, rotationSpeed = 0, type = 'generic' } = options;

    for (let i = 0; i < count; i++) {
      const particle = this.getParticle();
      if (!particle) break;

      const spawnAngle = angle + (Math.random() - 0.5) * angleVar;
      const spawnSpeed = speed + (Math.random() - 0.5) * speedVar;
      const spawnLife = Math.max(100, life + (Math.random() - 0.5) * lifeVar);
      const spawnSize = Math.max(1, size + (Math.random() - 0.5) * sizeVar);

      particle.x = x; particle.y = y;
      particle.vx = Math.cos(spawnAngle) * spawnSpeed;
      particle.vy = Math.sin(spawnAngle) * spawnSpeed;
      particle.life = spawnLife; particle.maxLife = spawnLife;
      particle.size = spawnSize;
      particle.color = colorVar ? Utils.randomChoice([color, colorVar]) : color;
      particle.alpha = alpha; particle.decay = alphaDecay;
      particle.gravity = gravity;
      particle.rotation = Math.random() * Math.PI * 2;
      particle.rotationSpeed = rotationSpeed * (Math.random() - 0.5);
      particle.type = type; particle.active = true;
      this.particles.push(particle);
    }
  }

  getParticle() {
    if (this.pool.length > 0) return this.pool.pop();
    if (this.particles.length >= this.maxParticles) return this.particles.shift();
    return new Particle();
  }

  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        p.active = false; this.pool.push(p); this.particles.splice(i, 1); continue;
      }
      p.vy += p.gravity * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      const lifeRatio = p.life / p.maxLife;
      p.alpha = lifeRatio * (1 - p.decay);
      p.size *= 0.99;
    }
  }

  render(ctx, camera) {
    ctx.save();
    for (const p of this.particles) {
      if (!p.active) continue;
      const screenPos = camera.worldToScreen(p.x, p.y);
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      if (p.type === 'smoke' || p.type === 'trail') {
        ctx.beginPath(); ctx.arc(screenPos.x, screenPos.y, p.size, 0, Math.PI * 2); ctx.fill();
      } else if (p.type === 'spark') {
        ctx.save(); ctx.translate(screenPos.x, screenPos.y); ctx.rotate(p.rotation);
        ctx.fillRect(-p.size / 2, -p.size * 2, p.size, p.size * 4); ctx.restore();
      } else if (p.type === 'debris') {
        ctx.save(); ctx.translate(screenPos.x, screenPos.y); ctx.rotate(p.rotation);
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size); ctx.restore();
      } else {
        ctx.beginPath(); ctx.arc(screenPos.x, screenPos.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
  }

  // FIXED: Reduced particle counts and sizes for less clutter
  explosion(x, y, color = '#FF6B35', size = 'medium') {
    const sizes = { small: 8, medium: 15, large: 25, huge: 40 };
    const baseSize = sizes[size] || sizes.medium;
    
    this.spawn({ x, y, count: Math.floor(baseSize * 0.6), speed: 100, speedVar: 60, angle: 0, angleVar: Math.PI * 2,
                 life: 600, lifeVar: 200, size: baseSize / 5, sizeVar: baseSize / 10,
                 color, colorVar: '#FFD700', alphaDecay: 0.02, gravity: 30, type: 'spark' });
    this.spawn({ x, y, count: Math.floor(baseSize * 0.3), speed: 50, speedVar: 30, angle: 0, angleVar: Math.PI * 2,
                 life: 800, lifeVar: 300, size: baseSize / 3, sizeVar: baseSize / 6,
                 color: '#555555', alphaDecay: 0.015, gravity: 20, type: 'debris' });
  }

  muzzleFlash(x, y, angle, color = '#FFD700') {
    this.spawn({ x, y, count: 3, speed: 50, speedVar: 20, angle, angleVar: 0.2,
                 life: 80, lifeVar: 20, size: 4, sizeVar: 2, color, alphaDecay: 0.15, type: 'spark' });
  }

  bloodSplatter(x, y, direction) {
    this.spawn({ x, y, count: 6, speed: 60, speedVar: 30, angle: direction, angleVar: Math.PI / 4,
                 life: 400, lifeVar: 100, size: 3, sizeVar: 1, color: '#8B0000', colorVar: '#FF0000',
                 alphaDecay: 0.03, gravity: 50, type: 'generic' });
  }

  trail(x, y, color = '#AAAAAA') {
    this.spawn({ x, y, count: 1, speed: 5, speedVar: 3, angle: 0, angleVar: Math.PI * 2,
                 life: 300, lifeVar: 50, size: 2, sizeVar: 1, color, alphaDecay: 0.05, type: 'trail' });
  }

  levelUp(x, y) {
    this.spawn({ x, y, count: 15, speed: 120, speedVar: 60, angle: -Math.PI / 2, angleVar: Math.PI / 2,
                 life: 1000, lifeVar: 300, size: 4, sizeVar: 2, color: '#FFD700', colorVar: '#FFA500',
                 alphaDecay: 0.015, gravity: -20, type: 'spark' });
  }

  clear() {
    for (const p of this.particles) { p.active = false; this.pool.push(p); }
    this.particles = [];
  }
}

// ============================================================
// FILE: js/core/renderer.js
// ============================================================

class Renderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.width = canvas.width;
    this.height = canvas.height;
    this.camera = null;
    this.particleSystem = null;
    this.debug = false;
    this.fps = 0;
    this.frameCount = 0;
    this.lastFpsTime = 0;
  }

  setCamera(camera) { this.camera = camera; }
  setParticleSystem(particleSystem) { this.particleSystem = particleSystem; }

  clear() {
    this.ctx.fillStyle = '#1a1a2e';
    this.ctx.fillRect(0, 0, this.width, this.height);
  }

  render(gameState) {
    this.clear();
    if (!this.camera) return;
    this.ctx.save();
    this.drawBackground();
    this.drawGrid();

    if (gameState.entities) {
      for (const entity of gameState.entities) {
        if (entity.active && this.camera.isVisible(entity.x, entity.y, entity.radius || 50)) {
          entity.render(this.ctx, this.camera);
        }
      }
    }

    if (this.particleSystem) {
      this.particleSystem.render(this.ctx, this.camera);
    }

    if (gameState.projectiles) {
      for (const proj of gameState.projectiles) {
        if (proj.active) this.drawProjectile(proj);
      }
    }

    this.ctx.restore();
    this.drawUI(gameState);
    this.updateFPS();
    if (this.debug) this.drawDebug(gameState);
  }

  drawBackground() {
    const topLeft = this.camera.worldToScreen(0, 0);
    const bottomRight = this.camera.worldToScreen(CONSTANTS.WORLD_WIDTH, CONSTANTS.WORLD_HEIGHT);
    const visibleWidth = bottomRight.x - topLeft.x;
    const visibleHeight = bottomRight.y - topLeft.y;
    this.ctx.fillStyle = '#16213e';
    this.ctx.fillRect(topLeft.x, topLeft.y, visibleWidth, visibleHeight);
    this.ctx.strokeStyle = '#e94560';
    this.ctx.lineWidth = 4;
    this.ctx.strokeRect(topLeft.x, topLeft.y, visibleWidth, visibleHeight);
  }

  drawGrid() {
    const tileSize = CONSTANTS.TILE_SIZE;
    const startX = Math.floor(this.camera.x / tileSize) * tileSize;
    const startY = Math.floor(this.camera.y / tileSize) * tileSize;
    const endX = startX + this.width + tileSize;
    const endY = startY + this.height + tileSize;
    this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    this.ctx.lineWidth = 1;
    for (let x = startX; x < endX; x += tileSize) {
      const screenX = x - this.camera.x;
      this.ctx.beginPath();
      this.ctx.moveTo(screenX, 0);
      this.ctx.lineTo(screenX, this.height);
      this.ctx.stroke();
    }
    for (let y = startY; y < endY; y += tileSize) {
      const screenY = y - this.camera.y;
      this.ctx.beginPath();
      this.ctx.moveTo(0, screenY);
      this.ctx.lineTo(this.width, screenY);
      this.ctx.stroke();
    }
  }

  drawProjectile(proj) {
    const screenPos = this.camera.worldToScreen(proj.x, proj.y);
    this.ctx.save();
    this.ctx.translate(screenPos.x, screenPos.y);
    this.ctx.rotate(proj.angle);
    this.ctx.fillStyle = proj.color || '#FFD700';
    this.ctx.globalAlpha = 0.8;
    this.ctx.fillRect(-proj.length / 2, -1, proj.length, 2);
    this.ctx.fillStyle = '#FFFFFF';
    this.ctx.fillRect(proj.length / 2 - 2, -1.5, 4, 3);
    this.ctx.restore();
  }

  drawUI(gameState) {}

  drawDebug(gameState) {
    this.ctx.fillStyle = '#00FF00';
    this.ctx.font = '14px monospace';
    this.ctx.textAlign = 'left';
    this.ctx.fillText(`FPS: ${this.fps}`, 10, 20);
    this.ctx.fillText(`Entities: ${gameState.entities?.length || 0}`, 10, 40);
    this.ctx.fillText(`Particles: ${this.particleSystem?.particles?.length || 0}`, 10, 60);
    this.ctx.fillText(`Projectiles: ${gameState.projectiles?.length || 0}`, 10, 80);
    this.ctx.fillText(`Camera: ${Math.round(this.camera.x)}, ${Math.round(this.camera.y)}`, 10, 100);
  }

  updateFPS() {
    this.frameCount++;
    const now = performance.now();
    if (now - this.lastFpsTime >= 1000) {
      this.fps = this.frameCount;
      this.frameCount = 0;
      this.lastFpsTime = now;
    }
  }

  resize(width, height) {
    this.width = width;
    this.height = height;
    this.canvas.width = width;
    this.canvas.height = height;
    if (this.camera) this.camera.resize(width, height);
  }
}

class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.camera = new Camera(canvas);
    this.renderer = new Renderer(canvas);
    this.particles = new ParticleSystem();
    this.input = new InputManager(canvas);
    this.state = {
      mode: 'menu',
      lastTime: 0,
      accumulator: 0,
      entities: [],
      projectiles: [],
      player: null,
      squad: [],
      enemies: [],
      bosses: [],
      pickups: [],
      obstacles: [],
      wave: 0,
      stage: 1,
      score: 0,
      kills: 0,
      time: 0,
      difficulty: 'NORMAL'
    };
    this.running = false;
    this.animationId = null;
    this.loop = this.loop.bind(this);
    this.renderer.setCamera(this.camera);
    this.renderer.setParticleSystem(this.particles);
    this.input.setCamera(this.camera);
    this.setupEventListeners();
  }

  setupEventListeners() {
    eventBus.on(EVENTS.GAME_START, () => this.startGame());
    eventBus.on(EVENTS.GAME_PAUSE, () => this.pause());
    eventBus.on(EVENTS.GAME_RESUME, () => this.resume());
    eventBus.on(EVENTS.GAME_OVER, () => this.gameOver());
    eventBus.on(EVENTS.GAME_WIN, () => this.victory());
    eventBus.on(EVENTS.WAVE_START, (wave) => this.startWave(wave));
    eventBus.on(EVENTS.PLAYER_SHOOT, (data) => this.spawnProjectile(data));
    eventBus.on(EVENTS.ENEMY_DEATH, (enemy) => this.onEnemyDeath(enemy));
    eventBus.on(EVENTS.BOSS_DEATH, (boss) => this.onBossDeath(boss));
  }

  init() {
    audioManager.init();
    this.input.init();
    this.resize();
    window.addEventListener('resize', () => this.resize());
    eventBus.emit(EVENTS.GAME_INIT);
    return this;
  }

  resize() {
    const container = this.canvas.parentElement || window;
    const width = container.innerWidth || window.innerWidth;
    const height = container.innerHeight || window.innerHeight;
    this.renderer.resize(width, height);
  }

  start() {
    if (this.running) return;
    this.running = true;
    this.state.lastTime = performance.now();
    this.loop();
  }

  stop() {
    this.running = false;
    if (this.animationId) {
      cancelAnimationFrame(this.animationId);
      this.animationId = null;
    }
  }

  pause() {
    if (this.state.mode === 'playing') {
      this.state.mode = 'paused';
      // FIXED: Stop game loop updates but keep rendering menu
      this.running = false;
      if (this.animationId) {
        cancelAnimationFrame(this.animationId);
        this.animationId = null;
      }
    }
  }

  resume() {
    if (this.state.mode === 'paused') {
      this.state.mode = 'playing';
      this.state.lastTime = performance.now();
      this.running = true;
      this.loop();
    }
  }

  startGame() {
    this.state.mode = 'playing';
    this.state.wave = 1;
    this.state.stage = 1;
    this.state.score = 0;
    this.state.kills = 0;
    this.state.time = 0;
    this.state.entities = [];
    this.state.projectiles = [];
    this.state.enemies = [];
    this.state.bosses = [];
    this.state.pickups = [];
    this.particles.clear();
    eventBus.emit(EVENTS.WAVE_START, 1);
    eventBus.emit(EVENTS.PLAYER_SPAWN);
    this.start();
  }

  startWave(wave) {
    this.state.wave = wave;
    const difficulty = CONSTANTS.DIFFICULTY[this.state.difficulty];
    const baseCount = 5 + wave * 3;
    const enemyCount = Math.floor(baseCount * difficulty.enemyCount);
    eventBus.emit(EVENTS.NOTIFICATION, `Wave ${wave} - ${enemyCount} enemies incoming!`);
    for (let i = 0; i < enemyCount; i++) {
      this.spawnEnemy(wave);
    }
  }

  spawnEnemy(wave) {
    const types = Object.keys(CONSTANTS.ENEMIES);
    const type = types[Math.min(Math.floor(wave / 3), types.length - 1)];
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.max(CONSTANTS.WORLD_WIDTH, CONSTANTS.WORLD_HEIGHT) / 2;
    const x = CONSTANTS.WORLD_WIDTH / 2 + Math.cos(angle) * dist;
    const y = CONSTANTS.WORLD_HEIGHT / 2 + Math.sin(angle) * dist;
    eventBus.emit(EVENTS.ENEMY_SPAWN, { type, x, y, wave });
  }

  spawnProjectile(data) {
    this.state.projectiles.push({
      x: data.x, y: data.y,
      vx: Math.cos(data.angle) * data.speed,
      vy: Math.sin(data.angle) * data.speed,
      angle: data.angle, speed: data.speed,
      damage: data.damage, range: data.range,
      distance: 0, color: data.color,
      length: data.length || 10,
      owner: data.owner, active: true
    });
  }

  onEnemyDeath(enemy) {
    this.state.kills++;
    this.state.score += enemy.scoreValue || 100;
    this.particles.explosion(enemy.x, enemy.y, enemy.color, 'medium');
    if (Math.random() < 0.15) this.spawnPickup(enemy.x, enemy.y);
    eventBus.emit(EVENTS.SCORE_UPDATE, this.state.score);
    if (this.state.enemies.length === 0 && this.state.bosses.length === 0) {
      if (this.state.wave % 2 === 1) this.onWaveComplete();
    }
  }

  onBossDeath(boss) {
    this.state.score += boss.scoreValue || 5000;
    this.particles.explosion(boss.x, boss.y, '#FF0000', 'huge');
    eventBus.emit(EVENTS.SCORE_UPDATE, this.state.score);
    eventBus.emit(EVENTS.NOTIFICATION, 'Boss Defeated!');
    const isBossRushWave = this.state.wave % 2 === 0;
    if (isBossRushWave) {
      eventBus.emit(EVENTS.NOTIFICATION, 'BOSS RUSH COMPLETE!');
      if (this.bossRushInterval) {
        clearInterval(this.bossRushInterval);
        this.bossRushInterval = null;
      }
      for (const enemy of this.state.enemies) {
        if (enemy.active) {
          enemy.active = false;
          this.particles.explosion(enemy.x, enemy.y, enemy.color, 'small');
        }
      }
      this.onWaveComplete();
    } else {
      this.onWaveComplete();
    }
  }

  onWaveComplete() {
    if (this.bossRushInterval) {
      clearInterval(this.bossRushInterval);
      this.bossRushInterval = null;
    }
    eventBus.emit(EVENTS.WAVE_END, this.state.wave);
    if (this.state.wave % CONSTANTS.BOSS.roundsPerStage === 0) {
      this.state.stage++;
      eventBus.emit(EVENTS.STAGE_COMPLETE, this.state.stage);
      if (this.state.stage > CONSTANTS.BOSS.stages) {
        eventBus.emit(EVENTS.GAME_WIN);
        return;
      }
    }
    setTimeout(() => {
      eventBus.emit(EVENTS.WAVE_START, this.state.wave + 1);
    }, 3000);
  }

  spawnPickup(x, y) {
    const types = ['health', 'ammo', 'xp', 'weapon'];
    const type = Utils.randomChoice(types);
    this.state.pickups.push({
      x, y, type, radius: 12, active: true,
      life: 10000, bobOffset: Math.random() * Math.PI * 2
    });
  }

  gameOver() {
    this.state.mode = 'gameover';
    this.stop();
    eventBus.emit(EVENTS.GAME_OVER, {
      score: this.state.score, kills: this.state.kills,
      time: this.state.time, wave: this.state.wave, stage: this.state.stage
    });
  }

  victory() {
    this.state.mode = 'victory';
    this.stop();
    eventBus.emit(EVENTS.GAME_WIN, {
      score: this.state.score, kills: this.state.kills, time: this.state.time
    });
  }

  loop(currentTime = performance.now()) {
    if (!this.running) return;
    this.animationId = requestAnimationFrame(this.loop);
    if (this.state.mode !== 'playing') {
      this.renderer.render(this.state);
      return;
    }
    const dt = Math.min((currentTime - this.state.lastTime) / 1000, 0.1);
    this.state.lastTime = currentTime;
    this.state.time += dt;
    this.update(dt);
    this.renderer.render(this.state);
  }

  update(dt) {
    if (this.state.player && this.state.player.active) {
      this.state.player.update(dt, this.input, this.state);
      this.camera.follow(this.state.player.x, this.state.player.y, dt);
    }
    for (const member of this.state.squad) {
      if (member.active) member.update(dt, this.state);
    }
    for (const enemy of this.state.enemies) {
      if (enemy.active) enemy.update(dt, this.state);
    }
    for (const boss of this.state.bosses) {
      if (boss.active) boss.update(dt, this.state);
    }
    for (let i = this.state.projectiles.length - 1; i >= 0; i--) {
      const proj = this.state.projectiles[i];
      if (!proj.active) {
        this.state.projectiles.splice(i, 1);
        continue;
      }
      proj.x += proj.vx * dt;
      proj.y += proj.vy * dt;
      proj.distance += proj.speed * dt;
      if (proj.distance >= proj.range) proj.active = false;
      this.checkProjectileCollisions(proj);
    }
    for (const pickup of this.state.pickups) {
      if (pickup.active) {
        pickup.life -= dt * 1000;
        pickup.bobOffset += dt * 3;
        if (pickup.life <= 0) pickup.active = false;
      }
    }
    this.particles.update(dt);
    if (this.state.base) {
      this.state.base.update(dt, this.state);
      if (this.state.base.captureState === 'friendly' && this.state.enemies.length === 0) {
        this.onWaveComplete();
        return;
      }
      if (this.state.base.captureState === 'captured' && (!this.state.player || !this.state.player.active)) {
        this.gameOver();
        return;
      }
    }
    this.state.entities = [
      ...([this.state.player].filter(Boolean)),
      ...this.state.squad,
      ...this.state.enemies,
      ...this.state.bosses,
      ...this.state.pickups
    ].filter(e => e && e.active);
    this.state.enemies = this.state.enemies.filter(e => e.active);
    this.state.bosses = this.state.bosses.filter(e => e.active);
    this.state.squad = this.state.squad.filter(e => e.active);
    this.state.pickups = this.state.pickups.filter(e => e.active);
    this.state.projectiles = this.state.projectiles.filter(p => p.active);
  }

  checkProjectileCollisions(proj) {
    for (const enemy of this.state.enemies) {
      if (!enemy.active) continue;
      if (Utils.circleCircle(proj.x, proj.y, 4, enemy.x, enemy.y, enemy.radius)) {
        proj.active = false;
        enemy.takeDamage(proj.damage, proj.owner);
        this.particles.bloodSplatter(enemy.x, enemy.y, proj.angle);
        break;
      }
    }
    for (const boss of this.state.bosses) {
      if (!boss.active) continue;
      if (Utils.circleCircle(proj.x, proj.y, 4, boss.x, boss.y, boss.radius)) {
        proj.active = false;
        boss.takeDamage(proj.damage, proj.owner);
        break;
      }
    }
  }

  destroy() {
    this.stop();
    this.input.destroy();
    eventBus.clear();
  }
}

class SaveManager {
  constructor() {
    this.saveSlot = 0;
    this.autoSaveInterval = 30000;
    this.autoSaveTimer = null;
  }

  init() {
    eventBus.on(EVENTS.SAVE_GAME, () => this.saveGame());
    eventBus.on(EVENTS.LOAD_GAME, () => this.loadGame());
    eventBus.on(EVENTS.DELETE_SAVE, () => this.deleteSave());
    this.startAutoSave();
  }

  startAutoSave() {
    this.autoSaveTimer = setInterval(() => {
      if (this.game && this.game.state.mode === 'playing') {
        this.saveGame();
      }
    }, this.autoSaveInterval);
  }

  stopAutoSave() {
    if (this.autoSaveTimer) {
      clearInterval(this.autoSaveTimer);
      this.autoSaveTimer = null;
    }
  }

  setGame(game) { this.game = game; }

  saveGame() {
    if (!this.game) return false;
    const gameState = this.game.state;
    const saveData = {
      version: '9.0',
      timestamp: Date.now(),
      player: this.serializePlayer(gameState.player),
      squad: gameState.squad.map(m => this.serializeSquadMember(m)),
      score: gameState.score,
      kills: gameState.kills,
      wave: gameState.wave,
      stage: gameState.stage,
      time: gameState.time,
      difficulty: gameState.difficulty
    };
    const success = Utils.storage.set(CONSTANTS.SAVE_KEY, saveData);
    if (success) eventBus.emit(EVENTS.NOTIFICATION, 'Game Saved');
    return success;
  }

  loadGame() {
    const saveData = Utils.storage.get(CONSTANTS.SAVE_KEY);
    if (!saveData) {
      eventBus.emit(EVENTS.NOTIFICATION, 'No save found');
      return null;
    }
    eventBus.emit(EVENTS.NOTIFICATION, 'Game Loaded');
    return saveData;
  }

  deleteSave() {
    Utils.storage.remove(CONSTANTS.SAVE_KEY);
    eventBus.emit(EVENTS.NOTIFICATION, 'Save Deleted');
  }

  hasSave() {
    return Utils.storage.get(CONSTANTS.SAVE_KEY) !== null;
  }

  serializePlayer(player) {
    if (!player) return null;
    return {
      x: player.x, y: player.y,
      health: player.health, maxHealth: player.maxHealth,
      weapon: player.weapon,
      ammo: { ...player.ammo },
      xp: player.xp, level: player.level,
      perks: { ...player.perks },
      score: player.score
    };
  }

  serializeSquadMember(member) {
    if (!member) return null;
    return {
      name: member.name,
      x: member.x, y: member.y,
      health: member.health, maxHealth: member.maxHealth,
      weapon: member.weapon,
      ammo: { ...member.ammo },
      state: member.state
    };
  }

  deserializePlayer(data) {
    return data;
  }
}

// ============================================================

class Entity {
  constructor(x, y, radius = 10) {
    this.x = x;
    this.y = y;
    this.radius = radius;
    this.active = true;
    this.color = '#FFFFFF';
    this.angle = 0;
    this.speed = 0;
    this.health = 100;
    this.maxHealth = 100;
    this.vx = 0;
    this.vy = 0;
    this.mass = 1;
    this.friction = 0.9;
  }

  update(dt, gameState) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vx *= this.friction;
    this.vy *= this.friction;
    this.x = Utils.clamp(this.x, this.radius, 3000 - this.radius);
    this.y = Utils.clamp(this.y, this.radius, 3000 - this.radius);
  }

  render(ctx, camera) {
    const screenPos = camera.worldToScreen(this.x, this.y);
    ctx.save();
    ctx.translate(screenPos.x, screenPos.y);
    ctx.rotate(this.angle);
    this.drawBody(ctx);
    ctx.restore();
    if (this.health < this.maxHealth) {
      this.drawHealthBar(ctx, camera);
    }
  }

  drawBody(ctx) {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  drawHealthBar(ctx, camera) {
    const screenPos = camera.worldToScreen(this.x, this.y);
    const barWidth = this.radius * 2;
    const barHeight = 4;
    const yOffset = -this.radius - 8;
    const healthRatio = this.health / this.maxHealth;
    ctx.fillStyle = '#333333';
    ctx.fillRect(screenPos.x - barWidth / 2, screenPos.y + yOffset, barWidth, barHeight);
    ctx.fillStyle = healthRatio > 0.5 ? '#00FF00' : healthRatio > 0.25 ? '#FFFF00' : '#FF0000';
    ctx.fillRect(screenPos.x - barWidth / 2, screenPos.y + yOffset, barWidth * healthRatio, barHeight);
  }

  takeDamage(amount, source = null) {
    this.health -= amount;
    if (this.health <= 0) {
      this.health = 0;
      this.die(source);
    }
  }

  heal(amount) {
    this.health = Math.min(this.health + amount, this.maxHealth);
  }

  die(source = null) {
    this.active = false;
  }

  moveTo(targetX, targetY, speed) {
    const dx = targetX - this.x;
    const dy = targetY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 0) {
      this.vx = (dx / dist) * speed;
      this.vy = (dy / dist) * speed;
      this.angle = Math.atan2(dy, dx);
    }
  }

  stop() {
    this.vx = 0;
    this.vy = 0;
  }

  distanceTo(entity) {
    return Utils.distance(this.x, this.y, entity.x, entity.y);
  }

  distanceToPoint(x, y) {
    return Utils.distance(this.x, this.y, x, y);
  }

  angleTo(entity) {
    return Utils.angle(this.x, this.y, entity.x, entity.y);
  }

  angleToPoint(x, y) {
    return Utils.angle(this.x, this.y, x, y);
  }
}

// FILE: js/game/player.js (FIXED - Simpler visuals, no direction indicator)
// ============================================================

class Player extends Entity {
  constructor(x, y) {
    super(x, y, CONSTANTS.PLAYER_RADIUS);
    this.color = '#4ECDC4';
    this.speed = CONSTANTS.PLAYER_SPEED;
    this.health = CONSTANTS.PLAYER_HEALTH;
    this.maxHealth = CONSTANTS.PLAYER_HEALTH;
    this.weapon = 'RIFLE';
    this.ammo = {};
    this.maxAmmo = {};
    this.reloading = false;
    this.reloadTimer = 0;
    this.lastShotTime = 0;
    this.xp = 0;
    this.level = 1;
    this.xpToNext = 100;
    this.perks = {};
    this.score = 0;
    this.invulnerable = false;
    this.invulnTimer = 0;
    this.regenTimer = 0;

    for (const [key, weapon] of Object.entries(CONSTANTS.WEAPONS)) {
      this.ammo[key] = weapon.ammo;
      this.maxAmmo[key] = weapon.ammo;
    }
  }

  update(dt, input, gameState) {
    if (!this.active) return;
    const moveVector = input.getMovementVector();
    this.vx = moveVector.x * this.speed;
    this.vy = moveVector.y * this.speed;
    this.angle = input.getAimAngle(this.x, this.y);

    if (input.mouse.isDown && !this.reloading) {
      this.tryShoot();
    }

    if (input.isKeyDown('KeyR') && !this.reloading) {
      this.startReload();
    }

    this.handleWeaponSwitch(input);

    if (this.reloading) {
      this.reloadTimer -= dt * 1000;
      if (this.reloadTimer <= 0) {
        this.finishReload();
      }
    }

    if (this.invulnerable) {
      this.invulnTimer -= dt * 1000;
      if (this.invulnTimer <= 0) {
        this.invulnerable = false;
      }
    }

    if (this.perks.REGEN > 0) {
      this.regenTimer += dt * 1000;
      if (this.regenTimer >= 1000) {
        this.heal(this.perks.REGEN * CONSTANTS.PERKS.REGEN.bonus);
        this.regenTimer = 0;
      }
    }

    super.update(dt, gameState);
  }

  handleWeaponSwitch(input) {
    const weaponKeys = {
      'Digit1': 'RIFLE',
      'Digit2': 'SHOTGUN',
      'Digit3': 'SNIPER',
      'Digit4': 'SMG',
      'Digit5': 'LMG'
    };

    for (const [key, weapon] of Object.entries(weaponKeys)) {
      if (input.isKeyDown(key)) {
        this.switchWeapon(weapon);
        break;
      }
    }
  }

  switchWeapon(weapon) {
    if (this.weapon === weapon) return;
    this.weapon = weapon;
    this.reloading = false;
    this.reloadTimer = 0;
    eventBus.emit(EVENTS.PLAYER_WEAPON_CHANGE, weapon);
  }

  tryShoot() {
    const weapon = CONSTANTS.WEAPONS[this.weapon];
    const now = performance.now();
    const fireInterval = 60000 / (weapon.fireRate * (1 + (this.perks.FIRE_RATE || 0) * CONSTANTS.PERKS.FIRE_RATE.bonus));

    if (now - this.lastShotTime < fireInterval) return;
    if (this.ammo[this.weapon] <= 0) {
      this.startReload();
      return;
    }

    this.ammo[this.weapon]--;
    this.lastShotTime = now;

    const damage = weapon.damage * (1 + (this.perks.DAMAGE_BOOST || 0) * CONSTANTS.PERKS.DAMAGE_BOOST.bonus);
    const spread = weapon.spread * (1 - (this.perks.ACCURACY || 0) * CONSTANTS.PERKS.ACCURACY.bonus);

    if (this.weapon === 'SHOTGUN') {
      for (let i = 0; i < weapon.pellets; i++) {
        const angle = this.angle + (Math.random() - 0.5) * spread * 2;
        eventBus.emit(EVENTS.PLAYER_SHOOT, {
          x: this.x + Math.cos(this.angle) * this.radius,
          y: this.y + Math.sin(this.angle) * this.radius,
          angle,
          speed: 800,
          damage: damage / weapon.pellets,
          range: weapon.range,
          color: weapon.color,
          owner: this
        });
      }
    } else {
      const angle = this.angle + (Math.random() - 0.5) * spread;
      eventBus.emit(EVENTS.PLAYER_SHOOT, {
        x: this.x + Math.cos(this.angle) * this.radius,
        y: this.y + Math.sin(this.angle) * this.radius,
        angle,
        speed: 1000,
        damage,
        range: weapon.range,
        color: weapon.color,
        owner: this
      });
    }

    audioManager.playShoot();
    eventBus.emit(EVENTS.AMMO_UPDATE, this.ammo[this.weapon], this.maxAmmo[this.weapon]);
  }

  startReload() {
    if (this.reloading || this.ammo[this.weapon] >= this.maxAmmo[this.weapon]) return;
    const weapon = CONSTANTS.WEAPONS[this.weapon];
    this.reloading = true;
    this.reloadTimer = weapon.reloadTime * (1 - (this.perks.RELOAD_SPEED || 0) * CONSTANTS.PERKS.RELOAD_SPEED.bonus);
    audioManager.playReload();
    eventBus.emit(EVENTS.PLAYER_RELOAD, this.reloadTimer);
  }

  finishReload() {
    this.ammo[this.weapon] = this.maxAmmo[this.weapon];
    this.reloading = false;
    this.reloadTimer = 0;
    eventBus.emit(EVENTS.AMMO_UPDATE, this.ammo[this.weapon], this.maxAmmo[this.weapon]);
  }

  takeDamage(amount, source = null) {
    if (this.invulnerable) return;
    super.takeDamage(amount);
    this.invulnerable = true;
    this.invulnTimer = 500;
    eventBus.emit(EVENTS.PLAYER_DAMAGE, amount, this.health, this.maxHealth);
    if (this.health <= 0) {
      eventBus.emit(EVENTS.PLAYER_DEATH, this);
    }
  }

  addXP(amount) {
    const multiplier = 1 + (this.perks.XP_BOOST || 0) * CONSTANTS.PERKS.XP_BOOST.bonus;
    this.xp += amount * multiplier;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.levelUp();
    }
    eventBus.emit(EVENTS.XP_UPDATE, this.xp, this.xpToNext, this.level);
  }

  levelUp() {
    this.level++;
    this.xpToNext = Math.floor(this.xpToNext * 1.2);
    this.maxHealth += 10;
    this.health = this.maxHealth;
    audioManager.playLevelUp();
    eventBus.emit(EVENTS.PLAYER_LEVEL_UP, this.level);
  }

  addPerk(perkType) {
    const perk = CONSTANTS.PERKS[perkType];
    if (!perk) return;
    if (!this.perks[perkType]) {
      this.perks[perkType] = 0;
    }
    if (this.perks[perkType] < perk.maxLevel) {
      this.perks[perkType]++;
      if (perkType === 'HEALTH_BOOST') {
        this.maxHealth += perk.bonus;
        this.health += perk.bonus;
      }
      eventBus.emit(EVENTS.NOTIFICATION, `${perk.name} +1 (Level ${this.perks[perkType]})`);
    }
  }

  // FIXED: Simpler render - no white triangle direction indicator, smaller level text
  render(ctx, camera) {
    if (!this.active) return;
    const screenPos = camera.worldToScreen(this.x, this.y);
    ctx.save();
    ctx.translate(screenPos.x, screenPos.y);
    ctx.rotate(this.angle);

    if (this.invulnerable && Math.floor(performance.now() / 50) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }

    // Simple body - no direction arrow
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Small weapon indicator only
    ctx.fillStyle = CONSTANTS.WEAPONS[this.weapon].color;
    ctx.fillRect(this.radius * 0.5, -2, 8, 4);

    ctx.restore();
    this.drawHealthBar(ctx, camera);
  }
}

// ============================================================
// FILE: js/game/enemy.js (FIXED - Better pathing, no rotation eyes)
// ============================================================

class Enemy extends Entity {
  constructor(x, y, type, wave = 1) {
    const config = CONSTANTS.ENEMIES[type] || CONSTANTS.ENEMIES.GRUNT;
    super(x, y, config.radius);
    this.type = type;
    this.name = config.name;
    this.color = config.color;
    this.speed = config.speed;
    this.health = config.health * (1 + wave * 0.1);
    this.maxHealth = this.health;
    this.damage = config.damage * (1 + wave * 0.05);
    this.scoreValue = config.score;
    this.xpValue = config.xp;
    this.attackRange = config.range || 300;
    this.attackCooldown = 0;
    this.attackRate = 1000;
    this.detectionRange = 600;
    this.state = 'idle';
    this.target = null;
    this.wanderAngle = Math.random() * Math.PI * 2;
    this.wanderTimer = 0;
    this.lastShotTime = 0;
  }

  update(dt, gameState) {
    if (!this.active) return;
    this.target = gameState.player;

    if (this.role && this.base) {
      this.updateRoleBehavior(dt, gameState);
      super.update(dt, gameState);
      return;
    }

    if (!this.target || !this.target.active) {
      this.wander(dt);
      super.update(dt, gameState);
      return;
    }

    const distToPlayer = this.distanceTo(this.target);

    switch (this.state) {
      case 'idle':
        if (distToPlayer < this.detectionRange) {
          this.state = 'chase';
        } else {
          this.wander(dt);
        }
        break;

      case 'chase':
        if (distToPlayer > this.detectionRange * 1.5) {
          this.state = 'idle';
        } else if (distToPlayer < this.attackRange) {
          this.state = 'attack';
        } else {
          this.moveTo(this.target.x, this.target.y, this.speed);
        }
        break;

      case 'attack':
        if (distToPlayer > this.attackRange * 1.2) {
          this.state = 'chase';
        } else {
          this.angle = this.angleTo(this.target);
          this.attackCooldown -= dt * 1000;
          if (this.attackCooldown <= 0) {
            this.attack(gameState);
            this.attackCooldown = this.attackRate;
          }
          const strafeDir = Math.sin(performance.now() / 500) > 0 ? 1 : -1;
          this.vx += Math.cos(this.angle + Math.PI / 2) * strafeDir * this.speed * 0.3;
          this.vy += Math.sin(this.angle + Math.PI / 2) * strafeDir * this.speed * 0.3;
        }
        break;

      case 'occupy':
        this.occupyBase(dt, gameState);
        break;

      case 'hunt':
        this.huntPlayer(dt, gameState);
        break;

      case 'patrol':
        this.patrol(dt, gameState);
        break;
    }

    this.separate(gameState.enemies);
    super.update(dt, gameState);
  }

  updateRoleBehavior(dt, gameState) {
    switch (this.state) {
      case 'occupy':
        this.occupyBase(dt, gameState);
        break;
      case 'hunt':
        this.huntPlayer(dt, gameState);
        break;
      case 'patrol':
        this.patrol(dt, gameState);
        break;
    }
  }

  occupyBase(dt, gameState) {
    if (!this.base) return;
    const distToBase = this.distanceToPoint(this.base.x, this.base.y);

    if (distToBase > this.base.radius * 0.5) {
      this.moveTo(this.base.x, this.base.y, this.speed);
    } else {
      this.stop();
      const angleFromCenter = Math.atan2(this.y - this.base.y, this.x - this.base.x);
      this.angle = angleFromCenter;

      if (this.target && this.target.active) {
        const distToPlayer = this.distanceTo(this.target);
        if (distToPlayer < this.attackRange) {
          this.attackCooldown -= dt * 1000;
          if (this.attackCooldown <= 0) {
            this.attack(gameState);
            this.attackCooldown = this.attackRate;
          }
        }
      }
    }
  }

  huntPlayer(dt, gameState) {
    if (!this.target || !this.target.active) return;
    const distToPlayer = this.distanceTo(this.target);
    const distToBase = this.distanceToPoint(this.base.x, this.base.y);

    if (distToBase < 400 && distToPlayer < 600) {
      const blockX = (this.target.x + this.base.x) / 2;
      const blockY = (this.target.y + this.base.y) / 2;
      this.moveTo(blockX, blockY, this.speed * 1.2);
    } else if (distToPlayer < this.detectionRange) {
      this.moveTo(this.target.x, this.target.y, this.speed);
      if (distToPlayer < this.attackRange) {
        this.angle = this.angleTo(this.target);
        this.attackCooldown -= dt * 1000;
        if (this.attackCooldown <= 0) {
          this.attack(gameState);
          this.attackCooldown = this.attackRate;
        }
      }
    } else {
      this.moveTo(this.base.x, this.base.y, this.speed * 0.7);
    }
  }

  patrol(dt, gameState) {
    if (!this.patrolCenter) return;
    this.patrolAngle = (this.patrolAngle || 0) + dt * 0.5;
    const targetX = this.patrolCenter.x + Math.cos(this.patrolAngle) * this.patrolRadius;
    const targetY = this.patrolCenter.y + Math.sin(this.patrolAngle) * this.patrolRadius;
    this.moveTo(targetX, targetY, this.speed * 0.6);

    if (this.target && this.target.active) {
      const distToPlayer = this.distanceTo(this.target);
      if (distToPlayer < this.attackRange) {
        this.angle = this.angleTo(this.target);
        this.attackCooldown -= dt * 1000;
        if (this.attackCooldown <= 0) {
          this.attack(gameState);
          this.attackCooldown = this.attackRate;
        }
      }
    }
  }

  wander(dt) {
    this.wanderTimer -= dt * 1000;
    if (this.wanderTimer <= 0) {
      this.wanderAngle += (Math.random() - 0.5) * Math.PI;
      this.wanderTimer = 2000 + Math.random() * 3000;
    }
    this.vx += Math.cos(this.wanderAngle) * this.speed * 0.5;
    this.vy += Math.sin(this.wanderAngle) * this.speed * 0.5;
  }

  separate(others) {
    let separateX = 0;
    let separateY = 0;
    let count = 0;

    for (const other of others) {
      if (other === this || !other.active) continue;
      const dist = this.distanceTo(other);
      if (dist < this.radius * 3 && dist > 0) {
        const dx = (this.x - other.x) / dist;
        const dy = (this.y - other.y) / dist;
        separateX += dx;
        separateY += dy;
        count++;
      }
    }

    if (count > 0) {
      this.vx += (separateX / count) * this.speed * 0.5;
      this.vy += (separateY / count) * this.speed * 0.5;
    }
  }

  attack(gameState) {
    if (this.type === 'SNIPER') {
      eventBus.emit(EVENTS.PLAYER_SHOOT, {
        x: this.x + Math.cos(this.angle) * this.radius,
        y: this.y + Math.sin(this.angle) * this.radius,
        angle: this.angle + (Math.random() - 0.5) * 0.1,
        speed: 1200,
        damage: this.damage,
        range: this.attackRange,
        color: '#FF0000',
        owner: this
      });
    } else {
      const dist = this.distanceTo(this.target);
      if (dist < this.radius + this.target.radius + 10) {
        this.target.takeDamage(this.damage, this);
      }
    }
  }

  takeDamage(amount, source = null) {
    super.takeDamage(amount, source);
    if (this.state === 'idle') {
      this.state = 'chase';
    }
    if (this.health <= 0) {
      eventBus.emit(EVENTS.ENEMY_DEATH, this);
      if (source && source.addXP) {
        source.addXP(this.xpValue);
      }
    }
  }

  die(source = null) {
    super.die(source);
    audioManager.playExplosion();
  }

  // FIXED: Simpler render - no rotating eyes, just shape
  render(ctx, camera) {
    if (!this.active) return;
    const screenPos = camera.worldToScreen(this.x, this.y);
    ctx.save();
    ctx.translate(screenPos.x, screenPos.y);
    ctx.rotate(this.angle);

    ctx.fillStyle = this.color;
    ctx.beginPath();

    switch (this.type) {
      case 'TANK':
        ctx.rect(-this.radius, -this.radius, this.radius * 2, this.radius * 2);
        break;
      case 'RUSHER':
        ctx.moveTo(this.radius * 1.2, 0);
        ctx.lineTo(-this.radius * 0.6, -this.radius * 0.8);
        ctx.lineTo(-this.radius * 0.6, this.radius * 0.8);
        ctx.closePath();
        break;
      default:
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
    }

    ctx.fill();

    // REMOVED: White eyes that rotate weirdly
    // ADDED: Simple dot to show facing direction
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(this.radius * 0.5, 0, this.radius * 0.15, 0, Math.PI * 2);
    ctx.fill();

    if (this.state === 'attack') {
      ctx.strokeStyle = '#FF0000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, this.radius + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
    this.drawHealthBar(ctx, camera);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = '10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, screenPos.x, screenPos.y - this.radius - 14);
  }
}

// FILE: js/game/squad.js (FIXED - Tighter follow, max chase range)
// ============================================================

class SquadMember extends Entity {
  constructor(x, y, index, name) {
    super(x, y, CONSTANTS.PLAYER_RADIUS * 0.9);
    this.index = index;
    this.name = name;
    this.color = '#95E1D3';
    this.speed = CONSTANTS.PLAYER_SPEED * 0.9;
    this.health = CONSTANTS.PLAYER_HEALTH * 0.8;
    this.maxHealth = this.health;
    this.weapon = 'RIFLE';
    this.ammo = {};
    this.maxAmmo = {};
    this.reloading = false;
    this.reloadTimer = 0;
    this.lastShotTime = 0;
    this.formation = FORMATIONS.WEDGE;
    this.formationOffset = { x: 0, y: 0 };
    this.target = null;
    this.state = 'follow';
    this.reviveTarget = null;
    this.shootRange = 400;
    this.maxChaseRange = 250; // FIXED: Don't chase enemies too far from player

    for (const [key, weapon] of Object.entries(CONSTANTS.WEAPONS)) {
      this.ammo[key] = weapon.ammo;
      this.maxAmmo[key] = weapon.ammo;
    }
  }

  update(dt, gameState) {
    if (!this.active) return;
    const player = gameState.player;
    if (!player || !player.active) return;

    this.updateFormationPosition(player);
    this.findTarget(gameState);

    switch (this.state) {
      case 'follow':
        this.followPlayer(dt, player);
        break;
      case 'attack':
        this.attackTarget(dt, player);
        break;
      case 'retreat':
        this.retreat(dt, player);
        break;
      case 'revive':
        this.reviveTeammate(dt);
        break;
    }

    if (this.target && this.target.active && this.state !== 'retreat') {
      const dist = this.distanceTo(this.target);
      if (dist < this.shootRange) {
        this.angle = this.angleTo(this.target);
        this.tryShoot();
      }
    }

    if (this.ammo[this.weapon] <= 0 && !this.reloading) {
      this.startReload();
    }

    if (this.reloading) {
      this.reloadTimer -= dt * 1000;
      if (this.reloadTimer <= 0) {
        this.finishReload();
      }
    }

    if (this.health < this.maxHealth * 0.3 && this.state !== 'retreat') {
      this.state = 'retreat';
    }

    super.update(dt, gameState);
  }

  updateFormationPosition(player) {
    const spacing = CONSTANTS.SQUAD_SEPARATION;
    const offsets = {
      [FORMATIONS.WEDGE]: [
        { x: -spacing, y: -spacing },
        { x: -spacing, y: spacing },
        { x: -spacing * 2, y: 0 }
      ],
      [FORMATIONS.LINE]: [
        { x: -spacing, y: -spacing * 1.5 },
        { x: -spacing, y: 0 },
        { x: -spacing, y: spacing * 1.5 }
      ],
      [FORMATIONS.COLUMN]: [
        { x: -spacing, y: 0 },
        { x: -spacing * 2, y: 0 },
        { x: -spacing * 3, y: 0 }
      ],
      [FORMATIONS.DIAMOND]: [
        { x: -spacing, y: 0 },
        { x: -spacing * 2, y: -spacing },
        { x: -spacing * 2, y: spacing }
      ],
      [FORMATIONS.CIRCLE]: [
        { x: Math.cos(this.index * Math.PI * 2 / 3) * spacing, y: Math.sin(this.index * Math.PI * 2 / 3) * spacing }
      ]
    };

    const formationOffsets = offsets[this.formation] || offsets[FORMATIONS.WEDGE];
    const offset = formationOffsets[this.index % formationOffsets.length];

    const cos = Math.cos(player.angle);
    const sin = Math.sin(player.angle);
    this.formationOffset = {
      x: offset.x * cos - offset.y * sin,
      y: offset.x * sin + offset.y * cos
    };
  }

  findTarget(gameState) {
    let closest = null;
    let closestDist = Infinity;

    // FIXED: Only target enemies near player (not across the map)
    const player = gameState.player;
    for (const enemy of gameState.enemies) {
      if (!enemy.active) continue;
      const distToMe = this.distanceTo(enemy);
      const distToPlayer = player ? Utils.distance(player.x, player.y, enemy.x, enemy.y) : Infinity;
      // Only chase if enemy is near player AND near me
      if (distToMe < this.shootRange && distToMe < closestDist && distToPlayer < 400) {
        closest = enemy;
        closestDist = distToMe;
      }
    }

    for (const boss of gameState.bosses) {
      if (!boss.active) continue;
      const dist = this.distanceTo(boss);
      if (dist < this.shootRange * 1.5 && dist < closestDist) {
        closest = boss;
        closestDist = dist;
      }
    }

    this.target = closest;

    if (closest && this.state === 'follow') {
      this.state = 'attack';
    } else if (!closest && this.state === 'attack') {
      this.state = 'follow';
    }
  }

  followPlayer(dt, player) {
    const targetX = player.x + this.formationOffset.x;
    const targetY = player.y + this.formationOffset.y;
    const dist = Utils.distance(this.x, this.y, targetX, targetY);
    if (dist > 20) {
      this.moveTo(targetX, targetY, this.speed);
    } else {
      this.stop();
      this.angle = player.angle;
    }
  }

  // FIXED: Return to player if chasing too far
  attackTarget(dt, player) {
    if (!this.target || !this.target.active) {
      this.state = 'follow';
      return;
    }

    const distToTarget = this.distanceTo(this.target);
    const distToPlayer = player ? this.distanceTo(player) : 0;

    // Return to player if too far
    if (distToPlayer > this.maxChaseRange * 2) {
      this.state = 'follow';
      this.target = null;
      return;
    }

    const idealDist = this.shootRange * 0.6;

    if (distToTarget > idealDist + 50) {
      this.moveTo(this.target.x, this.target.y, this.speed);
    } else if (distToTarget < idealDist - 50) {
      const angle = this.angleTo(this.target) + Math.PI;
      this.vx += Math.cos(angle) * this.speed * 0.5;
      this.vy += Math.sin(angle) * this.speed * 0.5;
    } else {
      const strafeDir = Math.sin(performance.now() / 800 + this.index) > 0 ? 1 : -1;
      this.vx += Math.cos(this.angle + Math.PI / 2) * strafeDir * this.speed * 0.3;
      this.vy += Math.sin(this.angle + Math.PI / 2) * strafeDir * this.speed * 0.3;
    }
  }

  retreat(dt, player) {
    const targetX = player.x + this.formationOffset.x * 0.5;
    const targetY = player.y + this.formationOffset.y * 0.5;
    this.moveTo(targetX, targetY, this.speed * 1.2);
    if (this.health > this.maxHealth * 0.6) {
      this.state = 'follow';
    }
  }

  reviveTeammate(dt) {
    if (!this.reviveTarget || this.reviveTarget.active) {
      this.state = 'follow';
      this.reviveTarget = null;
      return;
    }
    this.moveTo(this.reviveTarget.x, this.reviveTarget.y, this.speed);
    if (this.distanceTo(this.reviveTarget) < this.radius + this.reviveTarget.radius) {
      this.reviveTarget.active = true;
      this.reviveTarget.health = this.reviveTarget.maxHealth * 0.5;
      this.state = 'follow';
      this.reviveTarget = null;
    }
  }

  tryShoot() {
    const weapon = CONSTANTS.WEAPONS[this.weapon];
    const now = performance.now();
    const fireInterval = 60000 / weapon.fireRate;

    if (now - this.lastShotTime < fireInterval) return;
    if (this.ammo[this.weapon] <= 0) {
      this.startReload();
      return;
    }

    this.ammo[this.weapon]--;
    this.lastShotTime = now;

    eventBus.emit(EVENTS.PLAYER_SHOOT, {
      x: this.x + Math.cos(this.angle) * this.radius,
      y: this.y + Math.sin(this.angle) * this.radius,
      angle: this.angle + (Math.random() - 0.5) * weapon.spread,
      speed: 1000,
      damage: weapon.damage,
      range: weapon.range,
      color: weapon.color,
      owner: this
    });

    audioManager.playShoot();
  }

  startReload() {
    if (this.reloading || this.ammo[this.weapon] >= this.maxAmmo[this.weapon]) return;
    const weapon = CONSTANTS.WEAPONS[this.weapon];
    this.reloading = true;
    this.reloadTimer = weapon.reloadTime;
  }

  finishReload() {
    this.ammo[this.weapon] = this.maxAmmo[this.weapon];
    this.reloading = false;
    this.reloadTimer = 0;
  }

  setFormation(formation) {
    this.formation = formation;
  }

  // FIXED: Simpler render - no white triangle direction indicator
  render(ctx, camera) {
    if (!this.active) return;
    const screenPos = camera.worldToScreen(this.x, this.y);
    ctx.save();
    ctx.translate(screenPos.x, screenPos.y);
    ctx.rotate(this.angle);

    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Small dot instead of triangle
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(this.radius * 0.5, 0, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = CONSTANTS.WEAPONS[this.weapon].color;
    ctx.fillRect(this.radius * 0.4, -1.5, 8, 3);

    if (this.reloading) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, this.radius + 5, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
    this.drawHealthBar(ctx, camera);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = '9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, screenPos.x, screenPos.y - this.radius - 14);
  }
}

class Boss extends Entity {
  constructor(x, y, stage, round) {
    super(x, y, 40);
    this.stage = stage;
    this.round = round;
    this.color = '#FF00FF';
    this.speed = 2;
    this.maxHealth = 500 * (1 + (stage - 1) * 0.5) * (1 + (round - 1) * 0.3);
    this.health = this.maxHealth;
    this.damage = 30 * (1 + (stage - 1) * 0.3);
    this.scoreValue = 5000 * stage;
    this.xpValue = 100 * stage;
    this.attackRange = 400;
    this.attackCooldown = 0;
    this.attackRate = 800;
    this.detectionRange = 800;
    this.currentPhase = 1;
    this.maxPhases = 3;
    this.phaseThresholds = [0.7, 0.4, 0.1];
    this.state = 'idle';
    this.target = null;
    this.spawnTimer = 0;
    this.spawnInterval = 5000;
    this.specialAttackTimer = 0;
    this.specialAttackInterval = 10000;
  }

  update(dt, gameState) {
    if (!this.active) return;
    this.target = gameState.player;

    const healthPercent = this.health / this.maxHealth;
    
    // Phase transitions
    if (this.currentPhase < this.maxPhases && healthPercent <= this.phaseThresholds[this.currentPhase - 1]) {
      this.currentPhase++;
      eventBus.emit(EVENTS.BOSS_PHASE_CHANGE, this.currentPhase);
      eventBus.emit(EVENTS.NOTIFICATION, `BOSS PHASE ${this.currentPhase}!`);
      this.onPhaseChange();
    }

    if (!this.target || !this.target.active) {
      this.wander(dt);
      super.update(dt, gameState);
      return;
    }

    const distToPlayer = this.distanceTo(this.target);

    switch (this.state) {
      case 'idle':
        if (distToPlayer < this.detectionRange) {
          this.state = 'chase';
        } else {
          this.wander(dt);
        }
        break;

      case 'chase':
        if (distToPlayer > this.detectionRange * 1.5) {
          this.state = 'idle';
        } else if (distToPlayer < this.attackRange) {
          this.state = 'attack';
        } else {
          this.moveTo(this.target.x, this.target.y, this.speed);
        }
        break;

      case 'attack':
        if (distToPlayer > this.attackRange * 1.2) {
          this.state = 'chase';
        } else {
          this.angle = this.angleTo(this.target);
          this.attackCooldown -= dt * 1000;
          if (this.attackCooldown <= 0) {
            this.attack(gameState);
            this.attackCooldown = this.attackRate;
          }
          
          // Strafe
          const strafeDir = Math.sin(performance.now() / 600) > 0 ? 1 : -1;
          this.vx += Math.cos(this.angle + Math.PI / 2) * strafeDir * this.speed * 0.3;
          this.vy += Math.sin(this.angle + Math.PI / 2) * strafeDir * this.speed * 0.3;
        }
        break;
    }

    // Spawn adds
    this.spawnTimer += dt * 1000;
    if (this.spawnTimer >= this.spawnInterval) {
      this.spawnTimer = 0;
      this.spawnAdds(gameState);
    }

    // Special attack
    this.specialAttackTimer += dt * 1000;
    if (this.specialAttackTimer >= this.specialAttackInterval) {
      this.specialAttackTimer = 0;
      this.specialAttack(gameState);
    }

    super.update(dt, gameState);
  }

  onPhaseChange() {
    this.speed *= 1.2;
    this.attackRate *= 0.8;
    this.spawnInterval *= 0.8;
    
    // Heal a bit on phase change
    this.health = Math.min(this.health + this.maxHealth * 0.1, this.maxHealth);
  }

  attack(gameState) {
    // Shoot at player
    eventBus.emit(EVENTS.PLAYER_SHOOT, {
      x: this.x + Math.cos(this.angle) * this.radius,
      y: this.y + Math.sin(this.angle) * this.radius,
      angle: this.angle + (Math.random() - 0.5) * 0.2,
      speed: 800,
      damage: this.damage,
      range: this.attackRange,
      color: '#FF00FF',
      owner: this
    });

    // Phase 2+: Shoot in multiple directions
    if (this.currentPhase >= 2) {
      for (let i = 1; i < 4; i++) {
        const spreadAngle = this.angle + (i * Math.PI / 2);
        eventBus.emit(EVENTS.PLAYER_SHOOT, {
          x: this.x + Math.cos(spreadAngle) * this.radius,
          y: this.y + Math.sin(spreadAngle) * this.radius,
          angle: spreadAngle,
          speed: 600,
          damage: this.damage * 0.5,
          range: this.attackRange * 0.8,
          color: '#FF00FF',
          owner: this
        });
      }
    }

    // Phase 3: Ring attack
    if (this.currentPhase >= 3) {
      for (let i = 0; i < 8; i++) {
        const ringAngle = (Math.PI * 2 / 8) * i;
        eventBus.emit(EVENTS.PLAYER_SHOOT, {
          x: this.x,
          y: this.y,
          angle: ringAngle,
          speed: 500,
          damage: this.damage * 0.3,
          range: this.attackRange,
          color: '#FF00FF',
          owner: this
        });
      }
    }
  }

  specialAttack(gameState) {
    // Dash toward player
    if (this.target && this.target.active) {
      const dashAngle = this.angleTo(this.target);
      this.vx += Math.cos(dashAngle) * this.speed * 5;
      this.vy += Math.sin(dashAngle) * this.speed * 5;
    }
  }

  spawnAdds(gameState) {
    const types = ['GRUNT', 'RUSHER'];
    if (this.currentPhase >= 2) types.push('HEAVY');
    if (this.currentPhase >= 3) types.push('TANK');
    
    const type = types[Math.floor(Math.random() * types.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 150 + Math.random() * 100;
    
    eventBus.emit(EVENTS.ENEMY_SPAWN, {
      type,
      x: this.x + Math.cos(angle) * dist,
      y: this.y + Math.sin(angle) * dist,
      wave: this.game ? this.game.state.wave : 1
    });
  }

  wander(dt) {
    this.wanderAngle = (this.wanderAngle || 0) + (Math.random() - 0.5) * 0.5;
    this.vx += Math.cos(this.wanderAngle) * this.speed * 0.5;
    this.vy += Math.sin(this.wanderAngle) * this.speed * 0.5;
  }

  takeDamage(amount, source = null) {
    super.takeDamage(amount, source);
    if (this.state === 'idle') {
      this.state = 'chase';
    }
    if (this.health <= 0) {
      eventBus.emit(EVENTS.BOSS_DEATH, this);
    }
  }

  die(source = null) {
    super.die(source);
    audioManager.playExplosion();
  }

  render(ctx, camera) {
    if (!this.active) return;
    const screenPos = camera.worldToScreen(this.x, this.y);
    
    ctx.save();
    ctx.translate(screenPos.x, screenPos.y);
    ctx.rotate(this.angle);

    // Boss body - larger and more menacing
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Phase indicator rings
    for (let i = 1; i <= this.currentPhase; i++) {
      ctx.strokeStyle = `rgba(255, 0, 255, ${0.3 + i * 0.2})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, this.radius + i * 8, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Glowing core
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(0, 0, this.radius * 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Health bar (larger for boss)
    ctx.restore();
    
    const barWidth = 60;
    const barHeight = 6;
    const barY = screenPos.y - this.radius - 15;
    const healthRatio = this.health / this.maxHealth;
    
    ctx.fillStyle = '#333333';
    ctx.fillRect(screenPos.x - barWidth / 2, barY, barWidth, barHeight);
    ctx.fillStyle = healthRatio > 0.5 ? '#FF00FF' : healthRatio > 0.25 ? '#FF00AA' : '#FF0000';
    ctx.fillRect(screenPos.x - barWidth / 2, barY, barWidth * healthRatio, barHeight);
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1;
    ctx.strokeRect(screenPos.x - barWidth / 2, barY, barWidth, barHeight);

    // Boss name and phase
    ctx.fillStyle = '#FF00FF';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`BOSS - Phase ${this.currentPhase}`, screenPos.x, screenPos.y - this.radius - 22);
  }
}

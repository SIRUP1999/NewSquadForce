class Base {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.width = 200;
    this.height = 200;
    this.radius = 100;
    this.active = true;
    this.captureState = 'friendly';
    this.captureProgress = 0;
    this.captureRate = 0;
    this.enemiesInBase = 0;
    this.maxEnemiesInBase = 10;
    this.color = '#4ECDC4';
    this.borderColor = '#FFFFFF';
    this.health = 1000;
    this.maxHealth = 1000;
    this.defenders = [];
    this.turrets = [];
    this.ringAngle = 0;
    this.ringSpeed = 0.02;
  }

  update(dt, gameState) {
    if (!this.active) return;
    this.ringAngle += this.ringSpeed;
    this.enemiesInBase = 0;
    let enemiesNear = 0;

    for (const enemy of gameState.enemies) {
      if (!enemy.active) continue;
      const dist = Utils.distance(this.x, this.y, enemy.x, enemy.y);
      if (dist < this.radius) {
        this.enemiesInBase++;
        enemiesNear++;
      } else if (dist < this.radius * 2) {
        enemiesNear++;
      }
    }

    if (this.enemiesInBase > 0) {
      this.captureRate = this.enemiesInBase * 2;
      this.captureProgress += this.captureRate * dt;
      this.captureState = 'contested';
      if (this.captureProgress >= 100) {
        this.captureProgress = 100;
        this.captureState = 'captured';
        this.onCaptured();
      }
    } else if (this.captureProgress > 0 && enemiesNear === 0) {
      this.captureRate = -5;
      this.captureProgress += this.captureRate * dt;
      if (this.captureProgress <= 0) {
        this.captureProgress = 0;
        this.captureState = 'friendly';
      }
    }
    this.captureProgress = Utils.clamp(this.captureProgress, 0, 100);
  }

  onCaptured() {
    this.color = '#FF0000';
    this.borderColor = '#FF6B6B';
    eventBus.emit(EVENTS.NOTIFICATION, 'BASE CAPTURED! Recapture it!');
    eventBus.emit(EVENTS.BASE_CAPTURED, this);
  }

  onRecaptured() {
    this.color = '#4ECDC4';
    this.borderColor = '#FFFFFF';
    eventBus.emit(EVENTS.NOTIFICATION, 'BASE RECAPTURED!');
    eventBus.emit(EVENTS.BASE_RECLAIMED, this);
  }

  isInside(x, y) {
    return Utils.distance(this.x, this.y, x, y) < this.radius;
  }

  render(ctx, camera) {
    if (!this.active) return;
    const screenPos = camera.worldToScreen(this.x, this.y);
    ctx.save();
    ctx.fillStyle = this.color + '20';
    ctx.beginPath();
    ctx.arc(screenPos.x, screenPos.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = this.borderColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(screenPos.x, screenPos.y, this.radius, 0, Math.PI * 2);
    ctx.stroke();

    if (this.captureState === 'contested' || this.captureState === 'captured') {
      ctx.save();
      ctx.translate(screenPos.x, screenPos.y);
      ctx.rotate(this.ringAngle);
      ctx.strokeStyle = '#FF0000';
      ctx.lineWidth = 4;
      ctx.setLineDash([20, 10]);
      ctx.beginPath();
      ctx.arc(0, 0, this.radius + 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    if (this.captureProgress > 0) {
      const barWidth = 120;
      const barHeight = 10;
      const barY = screenPos.y - this.radius - 20;
      ctx.fillStyle = '#333333';
      ctx.fillRect(screenPos.x - barWidth / 2, barY, barWidth, barHeight);
      const progressColor = this.captureState === 'captured' ? '#FF0000' : '#FFD700';
      ctx.fillStyle = progressColor;
      ctx.fillRect(screenPos.x - barWidth / 2, barY, barWidth * (this.captureProgress / 100), barHeight);
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.strokeRect(screenPos.x - barWidth / 2, barY, barWidth, barHeight);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`${Math.floor(this.captureProgress)}%`, screenPos.x, barY + barHeight + 12);
    }

    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('BASE', screenPos.x, screenPos.y + 5);

    const statusText = this.captureState === 'friendly' ? 'SECURE' :
                       this.captureState === 'contested' ? 'UNDER ATTACK!' : 'CAPTURED!';
    ctx.fillStyle = this.captureState === 'friendly' ? '#00FF00' : '#FF0000';
    ctx.font = 'bold 12px Arial';
    ctx.fillText(statusText, screenPos.x, screenPos.y + 20);

    if (this.enemiesInBase > 0) {
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 16px Arial';
      ctx.fillText(`${this.enemiesInBase} ENEMIES INSIDE`, screenPos.x, screenPos.y + this.radius + 20);
    }
    ctx.restore();
  }
}

class HUD {
  constructor(game) {
    this.game = game;
    this.canvas = game.canvas;
    this.ctx = game.ctx;
    this.visible = true;
    this.health = 100;
    this.maxHealth = 100;
    this.ammo = 30;
    this.maxAmmo = 30;
    this.score = 0;
    this.kills = 0;
    this.wave = 1;
    this.stage = 1;
    this.xp = 0;
    this.xpToNext = 100;
    this.level = 1;
    this.weapon = 'RIFLE';
    this.reloading = false;
    this.reloadProgress = 0;
    this.notifications = [];
    this.squadStatus = [];
    this.minimapSize = 120;
    this.showControls = true; // FIXED: Show control hints initially
    this.controlHintTimer = 0;
    this.setupEventListeners();
  }

  setupEventListeners() {
    eventBus.on(EVENTS.HEALTH_UPDATE, (health, max) => {
      this.health = health;
      this.maxHealth = max;
    });
    eventBus.on(EVENTS.AMMO_UPDATE, (ammo, max) => {
      this.ammo = ammo;
      this.maxAmmo = max;
    });
    eventBus.on(EVENTS.SCORE_UPDATE, (score) => {
      this.score = score;
    });
    eventBus.on(EVENTS.XP_UPDATE, (xp, next, level) => {
      this.xp = xp;
      this.xpToNext = next;
      this.level = level;
    });
    eventBus.on(EVENTS.PLAYER_WEAPON_CHANGE, (weapon) => {
      this.weapon = weapon;
    });
    eventBus.on(EVENTS.PLAYER_RELOAD, (duration) => {
      this.reloading = true;
      this.reloadDuration = duration;
      this.reloadStart = performance.now();
    });
    eventBus.on(EVENTS.WAVE_START, (wave) => {
      this.wave = wave;
    });
    eventBus.on(EVENTS.NOTIFICATION, (text) => {
      this.notifications.push({
        text,
        time: performance.now(),
        duration: 4000
      });
    });
    eventBus.on(EVENTS.SQUAD_MEMBER_SPAWN, (member) => {
      this.squadStatus.push({
        name: member.name,
        health: member.health,
        maxHealth: member.maxHealth
      });
    });
    eventBus.on(EVENTS.SQUAD_MEMBER_DEATH, (member) => {
      const idx = this.squadStatus.findIndex(s => s.name === member.name);
      if (idx !== -1) {
        this.squadStatus[idx].health = 0;
      }
    });
  }

  render(ctx) {
    if (!this.visible || this.game.state.mode !== 'playing') return;
    ctx.save();
    this.drawHealthBar(ctx);
    this.drawAmmoCounter(ctx);
    this.drawScore(ctx);
    this.drawWaveInfo(ctx);
    this.drawXPBar(ctx);
    this.drawWeaponInfo(ctx);
    this.drawSquadStatus(ctx);
    this.drawMinimap(ctx);
    this.drawNotifications(ctx);
    if (this.reloading) {
      this.drawReloadIndicator(ctx);
    }
    // FIXED: Draw control hints
    if (this.showControls) {
      this.drawControlHints(ctx);
    }
    ctx.restore();
  }

  drawHealthBar(ctx) {
    const x = 20;
    const y = 20;
    const width = 180;
    const height = 18;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(x - 2, y - 2, width + 4, height + 4);
    const ratio = this.health / this.maxHealth;
    ctx.fillStyle = ratio > 0.5 ? '#00FF00' : ratio > 0.25 ? '#FFFF00' : '#FF0000';
    ctx.fillRect(x, y, width * ratio, height);
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, width, height);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.floor(this.health)}/${this.maxHealth}`, x + width / 2, y + height / 2 + 3);
  }

  // FIXED: Smaller ammo, grouped near health
  drawAmmoCounter(ctx) {
    const x = 20;
    const y = 44;
    const width = 180;

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x - 2, y - 2, width + 4, 20);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`${this.ammo}/${this.maxAmmo}`, x + 4, y + 14);

    ctx.font = '10px Arial';
    ctx.fillStyle = this.reloading ? '#FFD700' : '#AAAAAA';
    ctx.textAlign = 'right';
    ctx.fillText(this.reloading ? 'RELOADING...' : 'AMMO', x + width - 4, y + 14);
  }

  drawScore(ctx) {
    const x = this.canvas.width / 2;
    const y = 20;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`Score: ${Utils.formatNumber(this.score)}`, x, y);
    ctx.font = '12px Arial';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(`Kills: ${this.kills}`, x, y + 16);
  }

  drawWaveInfo(ctx) {
    const x = this.canvas.width / 2;
    const y = 55;
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    if (this.game.state.wave % 2 === 0) {
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 16px Arial';
      ctx.fillText(`WAVE ${this.wave} - BOSS RUSH!`, x, y);
    } else if (this.game.state.stage === 2) {
      ctx.fillText(`WAVE ${this.wave} - DEFEND BASE`, x, y);
    } else if (this.game.state.stage === 3) {
      ctx.fillText(`WAVE ${this.wave} - FINAL ASSAULT`, x, y);
    } else {
      ctx.fillText(`WAVE ${this.wave} - Stage ${this.stage}`, x, y);
    }
  }

  drawXPBar(ctx) {
    const x = 20;
    const y = 70;
    const width = 120;
    const height = 6;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(x - 1, y - 1, width + 2, height + 2);
    const ratio = this.xp / this.xpToNext;
    ctx.fillStyle = '#4ECDC4';
    ctx.fillRect(x, y, width * ratio, height);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '9px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Lv.${this.level}`, x, y - 2);
  }

  drawWeaponInfo(ctx) {
    const weapon = CONSTANTS.WEAPONS[this.weapon];
    if (!weapon) return;
    const x = 150;
    const y = 70;
    ctx.fillStyle = weapon.color;
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(weapon.name, x, y - 2);
  }

  drawSquadStatus(ctx) {
    const startX = 20;
    const startY = this.canvas.height - 60;
    const spacing = 50;
    for (let i = 0; i < this.squadStatus.length; i++) {
      const member = this.squadStatus[i];
      const x = startX + i * spacing;
      const y = startY;
      ctx.fillStyle = member.health > 0 ? '#95E1D3' : '#555555';
      ctx.beginPath();
      ctx.arc(x + 12, y, 10, 0, Math.PI * 2);
      ctx.fill();
      if (member.health > 0) {
        const ratio = member.health / member.maxHealth;
        ctx.fillStyle = '#333333';
        ctx.fillRect(x, y + 14, 24, 3);
        ctx.fillStyle = ratio > 0.5 ? '#00FF00' : '#FF0000';
        ctx.fillRect(x, y + 14, 24 * ratio, 3);
      }
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '8px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(member.name, x + 12, y + 26);
    }
  }

  drawMinimap(ctx) {
    const size = this.minimapSize;
    const x = this.canvas.width - size - 20;
    const y = this.canvas.height - size - 20;
    const scale = size / 3000;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, size, size);
    const gameState = this.game.state;

    if (gameState.base) {
      const bx = x + gameState.base.x * scale;
      const by = y + gameState.base.y * scale;
      const br = gameState.base.radius * scale;
      ctx.fillStyle = gameState.base.captureState === 'captured' ? '#FF0000' :
                      gameState.base.captureState === 'contested' ? '#FFD700' : '#4ECDC4';
      ctx.fillRect(bx - br, by - br, br * 2, br * 2);
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx - br, by - br, br * 2, br * 2);
    }

    ctx.fillStyle = '#FF0000';
    for (const enemy of gameState.enemies) {
      if (!enemy.active) continue;
      const mx = x + enemy.x * scale;
      const my = y + enemy.y * scale;
      ctx.fillRect(mx - 2, my - 2, 4, 4);
    }

    ctx.fillStyle = '#FF00FF';
    for (const boss of gameState.bosses) {
      if (!boss.active) continue;
      const mx = x + boss.x * scale;
      const my = y + boss.y * scale;
      ctx.fillRect(mx - 4, my - 4, 8, 8);
    }

    ctx.fillStyle = '#00FF00';
    for (const member of gameState.squad) {
      if (!member.active) continue;
      const mx = x + member.x * scale;
      const my = y + member.y * scale;
      ctx.fillRect(mx - 2, my - 2, 4, 4);
    }

    if (gameState.player && gameState.player.active) {
      ctx.fillStyle = '#4ECDC4';
      const mx = x + gameState.player.x * scale;
      const my = y + gameState.player.y * scale;
      ctx.beginPath();
      ctx.arc(mx, my, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 1;
    const cam = this.game.camera;
    ctx.strokeRect(
      x + cam.x * scale,
      y + cam.y * scale,
      cam.width * scale,
      cam.height * scale
    );
  }

  // FIXED: Notifications moved to top-left, away from action
  drawNotifications(ctx) {
    const now = performance.now();
    const startX = 20;
    const startY = 90;

    for (let i = this.notifications.length - 1; i >= 0; i--) {
      const notif = this.notifications[i];
      const age = now - notif.time;

      if (age > notif.duration) {
        this.notifications.splice(i, 1);
        continue;
      }

      const alpha = 1 - (age / notif.duration);
      const y = startY + (this.notifications.length - 1 - i) * 22;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'left';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
      ctx.shadowBlur = 4;
      ctx.fillText(notif.text, startX, y);
      ctx.restore();
    }
  }

  drawReloadIndicator(ctx) {
    const now = performance.now();
    const progress = (now - this.reloadStart) / this.reloadDuration;

    if (progress >= 1) {
      this.reloading = false;
      return;
    }

    const x = 20;
    const y = 44;
    const width = 180;
    const height = 16;

    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
    ctx.fillRect(x, y, width * progress, height);
  }

  // FIXED: Control hints overlay
  drawControlHints(ctx) {
    this.controlHintTimer += 16;
    if (this.controlHintTimer > 15000) { // Hide after 15 seconds
      this.showControls = false;
      return;
    }

    const alpha = Math.max(0, 1 - (this.controlHintTimer / 15000));
    const hints = [
      'WASD - Move',
      'MOUSE - Aim',
      'CLICK - Shoot',
      'R - Reload',
      '1-5 - Weapons',
      'ESC - Pause'
    ];

    const x = this.canvas.width - 160;
    const y = 20;

    ctx.save();
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(x - 10, y - 5, 150, hints.length * 18 + 10);

    ctx.fillStyle = '#4ECDC4';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('CONTROLS', x, y + 10);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = '10px Arial';
    for (let i = 0; i < hints.length; i++) {
      ctx.fillText(hints[i], x, y + 26 + i * 16);
    }
    ctx.restore();
  }

  show() {
    this.visible = true;
  }

  hide() {
    this.visible = false;
  }
}

      title: 'HOW TO PLAY',
      buttons: [
        { text: 'BACK', action: () => this.goBack() }
      ]
    };
  }

  startGame() {
    this.hideAll();
    eventBus.emit(EVENTS.GAME_START);
  }

  quitToMenu() {
    this.game.stop();
    this.showScreen('main');
  }

  goBack() {
    if (this.game.state.mode === 'paused') {
      this.showScreen('pause');
    } else {
      this.showScreen('main');
    }
  }

  showScreen(screenName, data = null) {
    this.currentScreen = screenName;
    this.screenData = data;
    this.updateButtons();
  }

  hideAll() {
    this.currentScreen = null;
    this.buttons = [];
  }

  updateButtons() {
    this.buttons = [];
    const screen = this.screens[this.currentScreen];
    if (!screen) return;

    const canvasWidth = this.canvas.width;
    const canvasHeight = this.canvas.height;
    const buttonWidth = 220;
    const buttonHeight = 50;
    const startY = canvasHeight / 2 - (screen.buttons.length * 60) / 2 + 50;

    for (let i = 0; i < screen.buttons.length; i++) {
      this.buttons.push({
        x: canvasWidth / 2 - buttonWidth / 2,
        y: startY + i * 70,
        width: buttonWidth,
        height: buttonHeight,
        text: screen.buttons[i].text,
        action: screen.buttons[i].action,
        hovered: false
      });
    }
  }

  handleMouseMove(x, y) {
    this.hoveredButton = null;
    for (const button of this.buttons) {
      button.hovered = Utils.pointInRect(x, y, button.x, button.y, button.width, button.height);
      if (button.hovered) {
        this.hoveredButton = button;
      }
    }
  }

  handleClick(x, y) {
    for (const button of this.buttons) {
      if (Utils.pointInRect(x, y, button.x, button.y, button.width, button.height)) {
        button.action();
        return true;
      }
    }
    return false;
  }

  render(ctx) {
    if (!this.currentScreen) return;

    const screen = this.screens[this.currentScreen];
    if (!screen) return;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

    ctx.fillStyle = '#4ECDC4';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(screen.title, this.canvas.width / 2, 100);

    if (screen.subtitle) {
      ctx.fillStyle = '#95E1D3';
      ctx.font = '20px Arial';
      ctx.fillText(screen.subtitle, this.canvas.width / 2, 135);
    }

    this.renderScreenContent(ctx);

    for (const button of this.buttons) {
      this.renderButton(ctx, button);
    }
  }

  renderButton(ctx, button) {
    const isHovered = button.hovered;

    ctx.fillStyle = isHovered ? '#4ECDC4' : 'rgba(78, 205, 196, 0.3)';
    ctx.fillRect(button.x, button.y, button.width, button.height);

    ctx.strokeStyle = '#4ECDC4';
    ctx.lineWidth = 2;
    ctx.strokeRect(button.x, button.y, button.width, button.height);

    ctx.fillStyle = isHovered ? '#000000' : '#FFFFFF';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(
      button.text,
      button.x + button.width / 2,
      button.y + button.height / 2
    );
    ctx.textBaseline = 'alphabetic';
  }

  renderScreenContent(ctx) {
    switch (this.currentScreen) {
      case 'gameover':
        this.renderGameOverContent(ctx);
        break;
      case 'victory':
        this.renderVictoryContent(ctx);
        break;
      case 'settings':
        this.renderSettingsContent(ctx);
        break;
      case 'howto':
        this.renderHowToContent(ctx);
        break;
    }
  }

  renderGameOverContent(ctx) {
    if (!this.screenData) return;
    const y = 200;
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`Score: ${Utils.formatNumber(this.screenData.score)}`, this.canvas.width / 2, y);
    ctx.fillText(`Kills: ${this.screenData.kills}`, this.canvas.width / 2, y + 28);
    ctx.fillText(`Time: ${Utils.formatTime(this.screenData.time * 1000)}`, this.canvas.width / 2, y + 56);
    ctx.fillText(`Wave: ${this.screenData.wave}`, this.canvas.width / 2, y + 84);
  }

  renderVictoryContent(ctx) {
    if (!this.screenData) return;
    const y = 200;
    ctx.fillStyle = '#FFD700';
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`Final Score: ${Utils.formatNumber(this.screenData.score)}`, this.canvas.width / 2, y);
    ctx.fillText(`Total Kills: ${this.screenData.kills}`, this.canvas.width / 2, y + 28);
    ctx.fillText(`Time: ${Utils.formatTime(this.screenData.time * 1000)}`, this.canvas.width / 2, y + 56);
  }

  renderSettingsContent(ctx) {
    const y = 200;
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Settings coming soon...', this.canvas.width / 2, y);
  }

  // FIXED: Comprehensive how-to-play with objectives
  renderHowToContent(ctx) {
    const sections = [
      { title: 'CONTROLS', color: '#4ECDC4', lines: [
        'WASD / Arrows - Move your character',
        'Mouse - Aim in any direction',
        'Left Click - Shoot your weapon',
        'R - Reload current weapon',
        '1-5 - Switch between weapons',
        'ESC - Pause the game'
      ]},
      { title: 'OBJECTIVE', color: '#FFD700', lines: [
        'Survive 18 waves across 3 rounds',
        'Kill all enemies to advance waves',
        'Defeat the boss on even-numbered waves',
        'Protect your base in Stage 2 & 3'
      ]},
      { title: 'WEAPONS', color: '#FF6B35', lines: [
        '1: Assault Rifle - Balanced, reliable',
        '2: Shotgun - High damage, close range',
        '3: Sniper Rifle - Long range, slow',
        '4: SMG - Fast fire rate, short range',
        '5: LMG - High capacity, medium range'
      ]},
      { title: 'TIPS', color: '#95E1D3', lines: [
        'Your squad follows automatically',
        'Stay near your base to defend it',
        'Kill the boss to win boss rush waves',
        'Collect XP to level up and get perks'
      ]}
    ];

    let y = 180;
    const x = this.canvas.width / 2;

    for (const section of sections) {
      ctx.fillStyle = section.color;
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(section.title, x, y);
      y += 22;

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '12px Arial';
      for (const line of section.lines) {
        ctx.fillText(line, x, y);
        y += 18;
      }
      y += 10;
    }
  }

  resize() {
    this.updateButtons();
  }
}

class MobileControls {
  constructor(game) {
    this.game = game;
    this.canvas = game.canvas;
    this.ctx = game.ctx;
    this.input = game.input;
    this.visible = false;
    this.joystick = {
      active: false,
      x: 100,
      y: this.canvas.height - 100,
      currentX: 100,
      currentY: this.canvas.height - 100,
      radius: 60,
      knobRadius: 25
    };
    this.buttons = {
      shoot: {
        x: this.canvas.width - 100,
        y: this.canvas.height - 100,
        radius: 50,
        color: '#FF6B35',
        label: 'FIRE',
        pressed: false
      },
      reload: {
        x: this.canvas.width - 180,
        y: this.canvas.height - 180,
        radius: 35,
        color: '#FFD700',
        label: 'R',
        pressed: false
      },
      weapon: {
        x: this.canvas.width - 60,
        y: this.canvas.height - 200,
        radius: 30,
        color: '#4ECDC4',
        label: 'W',
        pressed: false
      }
    };
    this.checkMobile();
  }

  checkMobile() {
    this.visible = this.input.isMobile;
  }

  update() {
    if (!this.visible) return;
    const inputJoystick = this.input.getJoystickData();
    if (inputJoystick.active) {
      this.joystick.active = true;
      this.joystick.currentX = inputJoystick.x;
      this.joystick.currentY = inputJoystick.y;
    } else {
      this.joystick.active = false;
      this.joystick.currentX = this.joystick.x;
      this.joystick.currentY = this.joystick.y;
    }
    this.buttons.shoot.pressed = this.input.mouse.isDown;
  }

  render(ctx) {
    if (!this.visible) return;
    ctx.save();
    ctx.globalAlpha = 0.6;

    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.beginPath();
    ctx.arc(this.joystick.x, this.joystick.y, this.joystick.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = this.joystick.active ? '#4ECDC4' : 'rgba(255, 255, 255, 0.5)';
    ctx.beginPath();
    ctx.arc(this.joystick.currentX, this.joystick.currentY, this.joystick.knobRadius, 0, Math.PI * 2);
    ctx.fill();

    for (const [key, button] of Object.entries(this.buttons)) {
      ctx.fillStyle = button.pressed ? button.color : 'rgba(255, 255, 255, 0.2)';
      ctx.strokeStyle = button.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(button.x, button.y, button.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = button.pressed ? '#000000' : button.color;
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(button.label, button.x, button.y);
    }

    ctx.restore();
  }

  resize() {
    this.joystick.x = 100;
    this.joystick.y = this.canvas.height - 100;
    this.joystick.currentX = this.joystick.x;
    this.joystick.currentY = this.joystick.y;

    this.buttons.shoot.x = this.canvas.width - 100;
    this.buttons.shoot.y = this.canvas.height - 100;
    this.buttons.reload.x = this.canvas.width - 180;
    this.buttons.reload.y = this.canvas.height - 180;
    this.buttons.weapon.x = this.canvas.width - 60;
    this.buttons.weapon.y = this.canvas.height - 200;
  }

  handleTouchStart(x, y) {
    const dist = Math.sqrt((x - this.joystick.x) ** 2 + (y - this.joystick.y) ** 2);
    if (dist < this.joystick.radius * 1.5) {
      this.joystick.active = true;
      return true;
    }

    for (const button of Object.values(this.buttons)) {
      const btnDist = Math.sqrt((x - button.x) ** 2 + (y - button.y) ** 2);
      if (btnDist < button.radius) {
        button.pressed = true;
        return true;
      }
    }

    return false;
  }

  handleTouchMove(x, y) {
    if (this.joystick.active) {
      const dx = x - this.joystick.x;
      const dy = y - this.joystick.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > this.joystick.radius) {
        const angle = Math.atan2(dy, dx);
        this.joystick.currentX = this.joystick.x + Math.cos(angle) * this.joystick.radius;
        this.joystick.currentY = this.joystick.y + Math.sin(angle) * this.joystick.radius;
      } else {
        this.joystick.currentX = x;
        this.joystick.currentY = y;
      }
      return true;
    }
    return false;
  }

  handleTouchEnd() {
    this.joystick.active = false;
    this.joystick.currentX = this.joystick.x;
    this.joystick.currentY = this.joystick.y;

    for (const button of Object.values(this.buttons)) {
      button.pressed = false;
    }
  }
}

class LeaderboardManager {
  constructor() {
    this.url = CONSTANTS.LEADERBOARD_URL;
    this.key = CONSTANTS.LEADERBOARD_KEY;
    this.entries = [];
    this.maxEntries = 100;
  }

  async load() {
    try {
      const response = await fetch(this.url, {
        headers: {
          'X-Master-Key': this.key
        }
      });

      if (!response.ok) throw new Error('Failed to load leaderboard');

      const data = await response.json();
      this.entries = data.record?.entries || [];
      return this.entries;
    } catch (error) {
      console.error('Leaderboard load error:', error);
      return [];
    }
  }

  async submit(name, score, kills, wave, time) {
    const entry = {
      name: name.substring(0, 20),
      score,
      kills,
      wave,
      time,
      date: new Date().toISOString()
    };

    this.entries.push(entry);
    this.entries.sort((a, b) => b.score - a.score);
    this.entries = this.entries.slice(0, this.maxEntries);

    try {
      const response = await fetch(this.url, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': this.key
        },
        body: JSON.stringify({ entries: this.entries })
      });

      if (!response.ok) throw new Error('Failed to submit score');

      eventBus.emit(EVENTS.NOTIFICATION, 'Score submitted!');
      return true;
    } catch (error) {
      console.error('Leaderboard submit error:', error);
      return false;
    }
  }

  getTop(count = 10) {
    return this.entries.slice(0, count);
  }

  getRank(score) {
    return this.entries.findIndex(e => e.score < score) + 1;
  }
}

class AICommandProcessor {
  constructor() {
    this.apiKey = null;
    this.enabled = false;
    this.processing = false;
    this.commandHistory = [];
    this.maxHistory = 20;
  }

  init(apiKey) {
    this.apiKey = apiKey;
    this.enabled = !!apiKey;
  }

  async processCommand(command, squad, gameState) {
    if (!this.enabled || !this.apiKey) {
      return { success: false, error: 'AI commands not enabled' };
    }

    if (this.processing) {
      return { success: false, error: 'Already processing a command' };
    }

    this.processing = true;

    try {
      const context = this.buildContext(squad, gameState);
      const response = await this.callClaude(command, context);
      const actions = this.parseResponse(response);
      this.executeActions(actions, squad, gameState);
      this.addToHistory(command, actions);

      this.processing = false;
      return { success: true, actions };
    } catch (error) {
      this.processing = false;
      console.error('AI Command Error:', error);
      return { success: false, error: error.message };
    }
  }

  buildContext(squad, gameState) {
    const squadInfo = squad.map(m => ({
      name: m.name,
      health: Math.round(m.health / m.maxHealth * 100),
      weapon: m.weapon,
      state: m.state,
      position: { x: Math.round(m.x), y: Math.round(m.y) }
    }));

    const enemyInfo = gameState.enemies.slice(0, 5).map(e => ({
      type: e.type,
      health: Math.round(e.health / e.maxHealth * 100),
      distance: Math.round(Math.sqrt((e.x - gameState.player.x) ** 2 + (e.y - gameState.player.y) ** 2)),
      direction: this.getDirection(gameState.player, e)
    }));

    const bossInfo = gameState.bosses.filter(b => b.active).map(b => ({
      stage: b.stage,
      phase: b.currentPhase,
      health: Math.round(b.health / b.maxHealth * 100)
    }));

    return {
      squad: squadInfo,
      enemies: enemyInfo,
      bosses: bossInfo,
      wave: gameState.wave,
      stage: gameState.stage,
      playerHealth: Math.round(gameState.player.health / gameState.player.maxHealth * 100)
    };
  }

  getDirection(from, to) {
    const angle = Math.atan2(to.y - from.y, to.x - from.x);
    const directions = ['E', 'NE', 'N', 'NW', 'W', 'SW', 'S', 'SE'];
    const index = Math.round(angle / (Math.PI / 4)) % 8;
    return directions[(index + 8) % 8];
  }

  async callClaude(command, context) {
    const response = await fetch(CONSTANTS.CLAUDE_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': this.apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: CONSTANTS.CLAUDE_MODEL,
        max_tokens: 150,
        messages: [
          {
            role: 'system',
            content: `You are a tactical AI commander for a top-down shooter game. Squad members: ${JSON.stringify(context.squad)}. Nearby enemies: ${JSON.stringify(context.enemies)}. Bosses: ${JSON.stringify(context.bosses)}. Wave ${context.wave}, Stage ${context.stage}. Player health: ${context.playerHealth}%. Respond with ONLY a JSON array of actions like [{"action": "move", "target": "Alpha", "position": {"x": 100, "y": 200}}, {"action": "attack", "target": "Alpha", "enemy": "nearest"}, {"action": "formation", "type": "wedge"}, {"action": "retreat", "target": "all"}]`
          },
          {
            role: 'user',
            content: command
          }
        ]
      })
    });

    if (!response.ok) {
      throw new Error(`API Error: ${response.status}`);
    }

    const data = await response.json();
    return data.content[0].text;
  }

  parseResponse(response) {
    try {
      const jsonMatch = response.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        return JSON.parse(jsonMatch[0]);
      }
      return [];
    } catch (e) {
      console.error('Failed to parse AI response:', e);
      return [];
    }
  }

  executeActions(actions, squad, gameState) {
    for (const action of actions) {
      this.executeAction(action, squad, gameState);
    }
  }

  executeAction(action, squad, gameState) {
    const target = action.target === 'all'
      ? squad
      : squad.filter(m => m.name === action.target || m.index === action.target);

    switch (action.action) {
      case 'move':
        for (const member of target) {
          if (action.position) {
            member.moveTo(action.position.x, action.position.y, member.speed);
          }
        }
        break;

      case 'attack':
        for (const member of target) {
          if (action.enemy === 'nearest') {
            let nearest = null;
            let nearestDist = Infinity;
            for (const enemy of gameState.enemies) {
              if (!enemy.active) continue;
              const dist = member.distanceTo(enemy);
              if (dist < nearestDist) {
                nearest = enemy;
                nearestDist = dist;
              }
            }
            member.target = nearest;
            member.state = 'attack';
          }
        }
        break;

      case 'formation':
        eventBus.emit(EVENTS.SQUAD_FORMATION_CHANGE, action.type);
        for (const member of squad) {
          member.setFormation(action.type);
        }
        break;

      case 'retreat':
        for (const member of target) {
          member.state = 'retreat';
        }
        break;

      case 'follow':
        for (const member of target) {
          member.state = 'follow';
          member.target = null;
        }
        break;

      case 'hold':
        for (const member of target) {
          member.stop();
          member.state = 'follow';
        }
        break;

      case 'revive':
        for (const member of target) {
          const deadMember = squad.find(m => !m.active);
          if (deadMember) {
            member.reviveTarget = deadMember;
            member.state = 'revive';
          }
        }
        break;

      case 'switch_weapon':
        for (const member of target) {
          if (action.weapon && CONSTANTS.WEAPONS[action.weapon]) {
            member.weapon = action.weapon;
          }
        }
        break;
    }
  }

  addToHistory(command, actions) {
    this.commandHistory.push({
      command,
      actions,
      timestamp: Date.now()
    });

    if (this.commandHistory.length > this.maxHistory) {
      this.commandHistory.shift();
    }
  }

  getHistory() {
    return this.commandHistory;
  }

  clearHistory() {
    this.commandHistory = [];
  }
}

class SquadForceV9 {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    if (!this.canvas) {
      this.canvas = document.createElement('canvas');
      this.canvas.id = 'gameCanvas';
      document.body.appendChild(this.canvas);
    }

    this.game = new Game(this.canvas);
    this.hud = new HUD(this.game);
    this.menu = new MenuManager(this.game);
    this.mobile = new MobileControls(this.game);
    this.ai = new AICommandProcessor();
    this.saveManager = new SaveManager();
    this.leaderboard = new LeaderboardManager();

    this.saveManager.setGame(this.game);
    this.game.renderer.drawUI = (ctx, state) => this.hud.render(ctx);

    this.setupEventListeners();
    this.resize();
  }

  setupEventListeners() {
    window.addEventListener('resize', () => this.resize());

    this.game.input.canvas.addEventListener('mousemove', (e) => {
      const rect = this.game.input.canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      this.menu.handleMouseMove(x, y);
    });

    this.game.input.canvas.addEventListener('click', (e) => {
      const rect = this.game.input.canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (!this.menu.handleClick(x, y)) {
        // Game click handled by input manager
      }
    });

    eventBus.on(EVENTS.PLAYER_SPAWN, () => this.onPlayerSpawn());
    eventBus.on(EVENTS.ENEMY_SPAWN, (data) => this.onEnemySpawn(data));
    eventBus.on(EVENTS.SQUAD_MEMBER_SPAWN, (member) => this.onSquadSpawn(member));
    eventBus.on(EVENTS.BOSS_SPAWN, (data) => this.onBossSpawn(data));
    eventBus.on(EVENTS.PLAYER_DEATH, () => this.onPlayerDeath());
    eventBus.on(EVENTS.WAVE_START, (wave) => this.onWaveStart(wave));

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Escape') {
        if (this.game.state.mode === 'playing') {
          eventBus.emit(EVENTS.GAME_PAUSE);
        } else if (this.game.state.mode === 'paused') {
          eventBus.emit(EVENTS.GAME_RESUME);
        }
      }
    });
  }

  init() {
    this.game.init();
    this.saveManager.init();
    this.menu.showScreen('main');
    this.game.start();
    return this;
  }

  resize() {
    const container = this.canvas.parentElement || window;
    const width = container.innerWidth || window.innerWidth;
    const height = container.innerHeight || window.innerHeight;

    this.canvas.width = width;
    this.canvas.height = height;
    this.canvas.style.width = width + 'px';
    this.canvas.style.height = height + 'px';

    this.game.renderer.resize(width, height);
    this.menu.resize();
    this.mobile.resize();
  }

  onPlayerSpawn() {
    const player = new Player(
      CONSTANTS.WORLD_WIDTH / 2,
      CONSTANTS.WORLD_HEIGHT / 2
    );
    this.game.state.player = player;
    this.game.state.entities.push(player);

    const squadNames = ['Alpha', 'Bravo', 'Charlie', 'Delta'];
    for (let i = 0; i < CONSTANTS.SQUAD_SIZE; i++) {
      const member = new SquadMember(
        player.x - 50,
        player.y + (i - 1.5) * 40,
        i,
        squadNames[i]
      );
      this.game.state.squad.push(member);
      this.game.state.entities.push(member);
      eventBus.emit(EVENTS.SQUAD_MEMBER_SPAWN, member);
    }

    const base = new Base(
      CONSTANTS.WORLD_WIDTH / 2 + 800,
      CONSTANTS.WORLD_HEIGHT / 2
    );
    this.game.state.base = base;
    this.game.state.entities.push(base);
  }

  onEnemySpawn(data) {
    const enemy = new Enemy(data.x, data.y, data.type, data.wave);
    
    if (data.role) {
      enemy.role = data.role;
      enemy.base = this.game.state.base;
      
      switch (data.role) {
        case 'occupier':
          enemy.speed *= 0.5;
          enemy.attackRange = 200;
          enemy.state = 'occupy';
          break;
        case 'interceptor':
          enemy.speed *= 1.3;
          enemy.detectionRange = 800;
          enemy.state = 'hunt';
          break;
        case 'guard':
          enemy.patrolCenter = { x: data.x, y: data.y };
          enemy.patrolRadius = 100;
          enemy.state = 'patrol';
          break;
      }
    }
    
    this.game.state.enemies.push(enemy);
    this.game.state.entities.push(enemy);
  }

  onSquadSpawn(member) {
    // Already handled in onPlayerSpawn
  }

  onBossSpawn(data) {
    const boss = new Boss(data.x, data.y, data.stage, data.round);
    this.game.state.bosses.push(boss);
    this.game.state.entities.push(boss);
    eventBus.emit(EVENTS.NOTIFICATION, `STAGE ${data.stage} BOSS APPEARS!`);
    audioManager.playBossAlert();
  }

  onPlayerDeath() {
    const aliveSquad = this.game.state.squad.filter(m => m.active);
    if (aliveSquad.length > 0) {
      // Switch control to squad member
    }

    eventBus.emit(EVENTS.GAME_OVER, {
      score: this.game.state.score,
      kills: this.game.state.kills,
      time: this.game.state.time,
      wave: this.game.state.wave,
      stage: this.game.state.stage
    });
  }

  onWaveStart(wave) {
    if (this.game.state.stage === 2) {
      this.startBaseDefenseWave(wave);
      return;
    }
    if (this.game.state.stage === 3) {
      this.startFinalAssaultWave(wave);
      return;
    }
    this.startNormalWave(wave);
  }

  startNormalWave(wave) {
    if (wave % 2 === 0) {
      const round = Math.ceil(wave / 6);
      const stage = ((wave - 1) % 6) < 2 ? 1 : ((wave - 1) % 6) < 4 ? 2 : 3;
      this.startBossRushWave(wave, round, stage);
    }
  }

  startBossRushWave(wave, round, stage) {
    eventBus.emit(EVENTS.NOTIFICATION, `WAVE ${wave} - BOSS RUSH! SURVIVE!`);
    const bossX = CONSTANTS.WORLD_WIDTH / 2 + (stage === 2 ? 400 : 0);
    const bossY = CONSTANTS.WORLD_HEIGHT / 2;
    
    setTimeout(() => {
      eventBus.emit(EVENTS.BOSS_SPAWN, {
        x: bossX,
        y: bossY,
        stage: stage,
        round: round
      });
    }, 2000);
    
    this.startContinuousSpawns(wave, round, stage);
  }

  startContinuousSpawns(wave, round, stage) {
    const spawnInterval = Math.max(2000, 5000 - (round * 1000));
    const maxConcurrentEnemies = 8 + (round * 3);
    
    this.bossRushInterval = setInterval(() => {
      if (this.game.state.mode !== 'playing') {
        clearInterval(this.bossRushInterval);
        this.bossRushInterval = null;
        return;
      }
      
      const currentEnemies = this.game.state.enemies.filter(e => e.active).length;
      
      if (currentEnemies < maxConcurrentEnemies) {
        this.spawnBossRushEnemy(wave, round, stage);
      }
    }, spawnInterval);
    
    const waveDuration = 60000 + (round * 15000);
    
    setTimeout(() => {
      if (this.bossRushInterval) {
        clearInterval(this.bossRushInterval);
        this.bossRushInterval = null;
        
        const bossAlive = this.game.state.bosses.some(b => b.active);
        if (!bossAlive) {
          eventBus.emit(EVENTS.NOTIFICATION, 'BOSS DEFEATED! Wave Complete!');
          this.game.onWaveComplete();
        }
      }
    }, waveDuration);
  }

  spawnBossRushEnemy(wave, round, stage) {
    const difficulty = 1 + (round * 0.3) + (stage * 0.2);
    const types = ['GRUNT', 'RUSHER', 'HEAVY'];
    if (stage >= 2) types.push('SNIPER');
    if (stage >= 3 || round >= 2) types.push('TANK');
    
    const type = types[Math.floor(Math.random() * types.length)];
    const spawnNearBoss = Math.random() > 0.5;
    let x, y;
    
    if (spawnNearBoss && this.game.state.bosses.length > 0) {
      const boss = this.game.state.bosses.find(b => b.active);
      if (boss) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 200 + Math.random() * 300;
        x = boss.x + Math.cos(angle) * dist;
        y = boss.y + Math.sin(angle) * dist;
      } else {
        const angle = Math.random() * Math.PI * 2;
        const dist = 600;
        x = this.game.state.player.x + Math.cos(angle) * dist;
        y = this.game.state.player.y + Math.sin(angle) * dist;
      }
    } else {
      const angle = Math.random() * Math.PI * 2;
      const dist = 500 + Math.random() * 300;
      x = this.game.state.player.x + Math.cos(angle) * dist;
      y = this.game.state.player.y + Math.sin(angle) * dist;
    }
    
    let role = null;
    if (stage === 2 && Math.random() > 0.6) {
      role = Math.random() > 0.5 ? 'interceptor' : 'guard';
    }
    
    eventBus.emit(EVENTS.ENEMY_SPAWN, {
      type,
      x,
      y,
      wave,
      role
    });
  }

  startBaseDefenseWave(wave) {
    const base = this.game.state.base;
    if (!base) return;
    const waveInStage = wave - CONSTANTS.BOSS.roundsPerStage;
    const difficulty = 1 + (waveInStage * 0.3);
    
    eventBus.emit(EVENTS.NOTIFICATION, `WAVE ${wave} - DEFEND THE BASE!`);
    
    const occupierCount = Math.floor(5 * difficulty);
    for (let i = 0; i < occupierCount; i++) {
      const angle = (Math.PI * 2 / occupierCount) * i + Math.random() * 0.5;
      const dist = base.radius * (0.3 + Math.random() * 0.5);
      const x = base.x + Math.cos(angle) * dist;
      const y = base.y + Math.sin(angle) * dist;
      eventBus.emit(EVENTS.ENEMY_SPAWN, { 
        type: 'GRUNT', 
        x, 
        y, 
        wave,
        role: 'occupier'
      });
    }
    
    const interceptorCount = Math.floor(3 * difficulty);
    for (let i = 0; i < interceptorCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 600 + Math.random() * 400;
      const x = base.x + Math.cos(angle) * dist;
      const y = base.y + Math.sin(angle) * dist;
      eventBus.emit(EVENTS.ENEMY_SPAWN, { 
        type: Math.random() > 0.5 ? 'RUSHER' : 'HEAVY', 
        x, 
        y, 
        wave,
        role: 'interceptor'
      });
    }
    
    const guardCount = Math.floor(4 * difficulty);
    for (let i = 0; i < guardCount; i++) {
      const angle = (Math.PI * 2 / guardCount) * i;
      const dist = base.radius + 50 + Math.random() * 100;
      const x = base.x + Math.cos(angle) * dist;
      const y = base.y + Math.sin(angle) * dist;
      eventBus.emit(EVENTS.ENEMY_SPAWN, { 
        type: 'SNIPER', 
        x, 
        y, 
        wave,
        role: 'guard'
      });
    }
    
    if (wave === 4) {
      setTimeout(() => {
        eventBus.emit(EVENTS.BOSS_SPAWN, {
          x: base.x + 300,
          y: base.y,
          stage: 2,
          round: 2
        });
      }, 5000);
    }
  }

  startFinalAssaultWave(wave) {
    const base = this.game.state.base;
    if (!base) return;
    const waveInStage = wave - (CONSTANTS.BOSS.roundsPerStage * 2);
    const difficulty = 1.5 + (waveInStage * 0.4);
    
    eventBus.emit(EVENTS.NOTIFICATION, `WAVE ${wave} - FINAL ASSAULT!`);
    
    const totalEnemies = Math.floor(15 * difficulty);
    
    const occupierCount = Math.floor(totalEnemies * 0.4);
    for (let i = 0; i < occupierCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = base.radius * Math.random() * 0.7;
      const x = base.x + Math.cos(angle) * dist;
      const y = base.y + Math.sin(angle) * dist;
      eventBus.emit(EVENTS.ENEMY_SPAWN, { 
        type: Math.random() > 0.7 ? 'TANK' : 'GRUNT', 
        x, 
        y, 
        wave,
        role: 'occupier'
      });
    }
    
    const interceptorCount = Math.floor(totalEnemies * 0.3);
    for (let i = 0; i < interceptorCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 500 + Math.random() * 500;
      const x = base.x + Math.cos(angle) * dist;
      const y = base.y + Math.sin(angle) * dist;
      eventBus.emit(EVENTS.ENEMY_SPAWN, { 
        type: Math.random() > 0.6 ? 'RUSHER' : 'HEAVY', 
        x, 
        y, 
        wave,
        role: 'interceptor'
      });
    }
    
    const guardCount = Math.floor(totalEnemies * 0.3);
    for (let i = 0; i < guardCount; i++) {
      const angle = (Math.PI * 2 / guardCount) * i;
      const dist = base.radius + 30 + Math.random() * 150;
      const x = base.x + Math.cos(angle) * dist;
      const y = base.y + Math.sin(angle) * dist;
      eventBus.emit(EVENTS.ENEMY_SPAWN, { 
        type: Math.random() > 0.5 ? 'SNIPER' : 'HEAVY', 
        x, 
        y, 
        wave,
        role: 'guard'
      });
    }
    
    if (wave === 6) {
      setTimeout(() => {
        eventBus.emit(EVENTS.BOSS_SPAWN, {
          x: base.x,
          y: base.y,
          stage: 3,
          round: 2
        });
      }, 3000);
    }
  }

  async sendAICommand(command) {
    return await this.ai.processCommand(
      command,
      this.game.state.squad,
      this.game.state
    );
  }

  getGameState() {
    return {
      mode: this.game.state.mode,
      score: this.game.state.score,
      kills: this.game.state.kills,
      wave: this.game.state.wave,
      stage: this.game.state.stage,
      player: this.game.state.player ? {
        health: this.game.state.player.health,
        maxHealth: this.game.state.player.maxHealth,
        x: this.game.state.player.x,
        y: this.game.state.player.y,
        weapon: this.game.state.player.weapon
      } : null,
      squad: this.game.state.squad.map(m => ({
        name: m.name,
        active: m.active,
        health: m.health,
        state: m.state
      })),
      enemies: this.game.state.enemies.length,
      bosses: this.game.state.bosses.filter(b => b.active).length
    };
  }
}

// ============================================================
// FILE: js/main.js (Part 4 - Initialization)
// ============================================================

let gameInstance = null;

function initGame() {
  gameInstance = new SquadForceV9();
  gameInstance.init();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initGame);
} else {
  initGame();
}

    </script>
